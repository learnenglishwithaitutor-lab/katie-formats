<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>HeyGen Image Uploader</title>
  <style>
    body { font-family: sans-serif; max-width: 480px; margin: 60px auto; padding: 0 24px; }
    h2 { font-size: 18px; font-weight: 500; margin-bottom: 24px; }
    label { font-size: 13px; color: #666; display: block; margin-bottom: 6px; }
    input[type=file] { margin-bottom: 16px; }
    button { padding: 10px 20px; background: #000; color: #fff; border: none; border-radius: 8px; cursor: pointer; font-size: 14px; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    #status { margin-top: 12px; font-size: 13px; color: #666; min-height: 20px; }
    #status.err { color: #c00; }
    #status.ok { color: #060; }
    #result { margin-top: 12px; background: #f4f4f4; border-radius: 8px; padding: 12px 16px; font-family: monospace; font-size: 13px; word-break: break-all; display: none; }
  </style>
</head>
<body>
  <h2>Upload image to HeyGen</h2>
  <label>Select image file</label>
  <input type="file" id="img" accept="image/*" /><br>
  <button id="btn" onclick="upload()">Upload</button>
  <p id="status"></p>
  <div id="result"></div>
  <script>
    async function upload() {
      const file = document.getElementById('img').files[0];
      const status = document.getElementById('status');
      const result = document.getElementById('result');
      const btn = document.getElementById('btn');
      if (!file) { status.textContent = 'Please select an image first.'; status.className = 'err'; return; }
      btn.disabled = true;
      status.className = '';
      status.textContent = 'Reading image...';
      result.style.display = 'none';
      const b64 = await new Promise((res, rej) => {
        const r = new FileReader();
        r.onload = () => res(r.result.split(',')[1]);
        r.onerror = rej;
        r.readAsDataURL(file);
      });
      status.textContent = 'Uploading to HeyGen...';
      try {
        const resp = await fetch('/api/heygen-upload', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ imageBase64: b64, mimeType: file.type || 'image/png' })
        });
        const data = await resp.json();
        if (!resp.ok || data.error) {
          status.textContent = 'Upload failed: ' + JSON.stringify(data.error);
          status.className = 'err';
          btn.disabled = false;
          return;
        }
        status.textContent = 'Uploaded successfully!';
        status.className = 'ok';
        result.style.display = 'block';
        result.textContent = 'asset_id: ' + (data.data?.id || data.id || JSON.stringify(data));
      } catch (e) {
        status.textContent = 'Error: ' + e.message;
        status.className = 'err';
      }
      btn.disabled = false;
    }
  </script>
</body>
</html>
