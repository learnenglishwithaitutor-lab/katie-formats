<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#F0EEE9" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Katie Formats" />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icon-192.png" />
  <title>Katie Formats</title>
  <!-- BUST-v39 -->
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #F0EEE9; --surface: #FFFFFF;
      --border: rgba(0,0,0,0.08); --text: #1a1a1a; --muted: #888;
      --approve: #1D9E75; --approve-bg: rgba(29,158,117,0.1);
      --reject: #E24B4A; --reject-bg: rgba(226,75,74,0.1);
    }
    html, body {
      height: 100%; background: var(--bg); color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Segoe UI', sans-serif;
      overflow: hidden; -webkit-tap-highlight-color: transparent;
    }
    .app {
      display: flex; flex-direction: column; height: 100dvh;
      padding: env(safe-area-inset-top,16px) 16px env(safe-area-inset-bottom,20px);
      max-width: 480px; margin: 0 auto;
    }

    /* Header */
    .header { display: flex; justify-content: space-between; align-items: flex-start; padding: 12px 0 10px; flex-shrink: 0; }
    .header-left h1 { font-size: 15px; font-weight: 600; letter-spacing: -0.2px; }
    .header-left .total-count { font-size: 11px; color: var(--muted); margin-top: 2px; }
    .header-right { display: flex; flex-direction: column; align-items: flex-end; gap: 3px; }
    
    .icon-btn { background: none; border: none; cursor: pointer; padding: 0; font-size: 14px; line-height: 1; color: var(--muted); }
    .icon-btn:active { opacity: 0.5; }
    .refresh-btn { background: none; border: none; cursor: pointer; padding: 0; display: flex; align-items: center; gap: 4px; color: var(--text); font-size: 13px; font-weight: 500; font-family: inherit; }
    .refresh-btn:active { opacity: 0.5; }
    .refresh-icon { font-size: 16px; line-height: 1; display: inline-block; }
    @keyframes spin-icon { to { transform: rotate(360deg); } }
    .refresh-icon.spinning { animation: spin-icon 0.8s linear infinite; }
    .last-pulled { font-size: 10px; color: var(--muted); }

    /* Progress */
    .progress-bar { height: 2px; background: rgba(0,0,0,0.06); border-radius: 2px; margin-bottom: 12px; flex-shrink: 0; }
    .progress-fill { height: 100%; background: var(--approve); border-radius: 2px; transition: width 0.4s cubic-bezier(0.4,0,0.2,1); }

    /* Card area */
    .card-area { flex: 1; position: relative; min-height: 0; }
    .card-stack { position: absolute; top: 0; bottom: 0; left: 10px; right: 10px; }
    .card {
      position: absolute; top: 0; left: 0; right: 0; bottom: 0;
      background: var(--surface); border: 0.5px solid var(--border);
      border-radius: 20px; overflow: hidden; display: flex; flex-direction: column;
      touch-action: none; will-change: transform; z-index: 2;
      box-shadow: 8px 8px 0 0 #ddd8ce, 14px 14px 0 0 #d0cbc0;
    }
    .card.animating { transition: transform 0.38s cubic-bezier(0.4,0,0.2,1), opacity 0.38s ease; }
    .card.fly-right { transform: translateX(110%) rotate(12deg) !important; opacity: 0; }
    .card.fly-left  { transform: translateX(-110%) rotate(-12deg) !important; opacity: 0; }
    .deck-card { position: absolute; background: var(--surface); border: 0.5px solid var(--border); border-radius: 20px; pointer-events: none; }
    .deck-card-2 { top: 10px; left: 8px; right: 8px; bottom: 0; opacity: 0.55; z-index: 1; }
    .deck-card-3 { top: 0; left: 16px; right: 16px; bottom: 0; opacity: 0.3; z-index: 0; }

    /* Video frame */
    .video-frame { flex: 1; min-height: 0; background: #ebebeb; position: relative; }
    .video-loading { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 10px; color: var(--muted); font-size: 13px; }
    .video-loading .spinner { width: 24px; height: 24px; border: 2px solid rgba(0,0,0,0.08); border-top-color: var(--approve); border-radius: 50%; animation: spin-icon 0.8s linear infinite; }
    .watch-link { color: #5DCAA5; font-size: 12px; text-decoration: none; padding: 6px 14px; border: 0.5px solid #5DCAA5; border-radius: 999px; margin-top: 6px; }

    /* Meta */
    .meta { padding: 12px 14px 16px; flex-shrink: 0; border-top: 0.5px solid var(--border); background: var(--surface); }
    .meta-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; gap: 8px; }
    .meta-top-left { display: flex; align-items: center; gap: 8px; min-width: 0; }
    .badge { font-size: 10px; font-weight: 600; letter-spacing: 0.3px; text-transform: uppercase; padding: 3px 9px; border-radius: 999px; background: rgba(29,158,117,0.12); color: #1D9E75; white-space: nowrap; flex-shrink: 0; }
    .posted-date { font-size: 11px; color: var(--muted); white-space: nowrap; }
    .comments-link { font-size: 12px; color: #5DCAA5; text-decoration: none; font-weight: 500; white-space: nowrap; flex-shrink: 0; }
    .card-title { font-size: 13px; font-weight: 500; line-height: 1.5; color: var(--text); word-break: break-word; }
    .views { font-size: 11px; color: var(--muted); margin-top: 6px; }

    /* Stamps */
    .stamp { position: absolute; top: 28px; font-size: 28px; font-weight: 900; padding: 8px 16px; border-radius: 8px; opacity: 0; pointer-events: none; z-index: 10; letter-spacing: 3px; text-transform: uppercase; }
    .stamp.approve { left: 18px; color: #1D9E75; border: 4px solid #1D9E75; transform: rotate(-15deg); background: rgba(255,255,255,0.9); }
    .stamp.reject  { right: 18px; color: #E24B4A; border: 4px solid #E24B4A; transform: rotate(15deg); background: rgba(255,255,255,0.9); }
    .card-bg-overlay { position: absolute; inset: 0; border-radius: 20px; pointer-events: none; z-index: 1; opacity: 0; }

    /* Script card */
    .script-thumb { flex: 1; min-height: 0; background: #ebebeb; position: relative; overflow: hidden; }
    .script-source { padding: 8px 14px; border-bottom: 0.5px solid var(--border); display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
    .script-source-label { font-size: 10px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.3px; }
    .script-source-handle { font-size: 11px; color: #1D9E75; font-weight: 600; }
    #s-swipe-zone { flex: 1; min-height: 0; display: flex; flex-direction: column; }
    .script-body { height: 42%; flex-shrink: 0; overflow-y: auto; padding: 0 0 16px; -webkit-overflow-scrolling: touch; border-top: 0.5px solid var(--border); }
    .script-section { padding: 12px 14px 0; }
    .script-label { font-size: 10px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; }
    .script-text { font-size: 13px; line-height: 1.7; color: var(--text); word-break: break-word; }
    .script-divider { margin: 14px 14px; border: none; border-top: 1.5px dashed var(--border); }
    .script-katie { background: rgba(29,158,117,0.04); border-radius: 12px; padding: 12px; margin: 0 14px 16px; }
    .script-katie .script-label { color: #1D9E75; }

    /* Settings */
    .settings-screen { display: flex; flex-direction: column; flex: 1; min-height: 0; padding-top: 4px; }
    .settings-section-title { font-size: 11px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; }
    .accounts-list { display: flex; flex-direction: column; gap: 8px; overflow-y: auto; flex: 1; margin-bottom: 16px; }
    .account-row { display: flex; align-items: center; gap: 10px; background: var(--surface); border: 0.5px solid var(--border); border-radius: 12px; padding: 12px 14px; }
    .account-info { flex: 1; min-width: 0; }
    .account-handle { font-size: 13px; font-weight: 600; color: var(--text); }
    .account-url { font-size: 11px; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-top: 1px; }
    .remove-btn { background: none; border: none; cursor: pointer; font-size: 20px; color: var(--muted); padding: 0; line-height: 1; flex-shrink: 0; }
    .remove-btn:active { color: var(--reject); }
    .add-row { display: flex; gap: 8px; margin-bottom: 16px; flex-shrink: 0; }
    .add-input { flex: 1; padding: 12px 14px; border: 0.5px solid var(--border); border-radius: 12px; font-size: 13px; font-family: inherit; background: var(--surface); color: var(--text); outline: none; }
    .add-input:focus { border-color: var(--approve); }
    .add-input::placeholder { color: var(--muted); }
    .add-btn { padding: 12px 16px; border-radius: 12px; font-size: 13px; font-weight: 600; font-family: inherit; border: none; background: var(--approve); color: #fff; cursor: pointer; flex-shrink: 0; }
    .add-btn:active { opacity: 0.8; }
    .back-btn { width: 100%; padding: 14px; border-radius: 14px; font-size: 15px; font-weight: 600; font-family: inherit; border: 0.5px solid var(--border); background: var(--surface); color: var(--text); cursor: pointer; flex-shrink: 0; }

    /* Done / loading screens */
    .done { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: flex-start; text-align: center; padding: 2rem 1rem; overflow-y: auto; padding-top: max(2rem, 8vh); }
    .done .check { font-size: 48px; margin-bottom: 12px; }
    .done h2 { font-size: 22px; font-weight: 700; margin-bottom: 6px; letter-spacing: -0.4px; }
    .done > p { font-size: 14px; color: var(--muted); margin-bottom: 20px; }
    .pills { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; justify-content: center; }
    .pill { padding: 6px 18px; border-radius: 999px; font-size: 13px; font-weight: 600; }
    .pill.a { background: var(--approve-bg); color: var(--approve); border: 0.5px solid var(--approve); }
    .pill.r { background: var(--reject-bg); color: var(--reject); border: 0.5px solid var(--reject); }
    .approved-list { width: 100%; border: 0.5px solid var(--border); border-radius: 14px; overflow: hidden; margin-bottom: 16px; text-align: left; max-height: 200px; overflow-y: auto; }
    .approved-item { padding: 11px 14px; border-bottom: 0.5px solid var(--border); display: flex; justify-content: space-between; align-items: center; gap: 8px; }
    .approved-item:last-child { border-bottom: none; }
    .approved-item .t { font-size: 13px; font-weight: 500; flex: 1; line-height: 1.3; }
    .approved-item .v { font-size: 11px; color: var(--muted); white-space: nowrap; }
    .video-results { width: 100%; margin-bottom: 16px; text-align: left; display: flex; flex-direction: column; gap: 14px; }
    .video-result { border: 0.5px solid var(--border); border-radius: 14px; padding: 12px; }
    .video-result-head { display: flex; justify-content: space-between; align-items: center; gap: 8px; }
    .video-result-head .t { font-size: 13px; font-weight: 500; }
    .btn-primary { width: 100%; padding: 15px; border-radius: 14px; font-size: 15px; font-weight: 700; cursor: pointer; border: none; background: var(--approve); color: #fff; font-family: inherit; }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-secondary { width: 100%; padding: 13px; border-radius: 14px; font-size: 14px; font-weight: 600; cursor: pointer; border: 0.5px solid var(--border); background: var(--surface); color: var(--text); margin-top: 10px; font-family: inherit; }
    .loading-screen { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 16px; text-align: center; padding: 2rem; }
    .loading-spinner { width: 36px; height: 36px; border: 3px solid rgba(0,0,0,0.08); border-top-color: var(--approve); border-radius: 50%; animation: spin-icon 0.8s linear infinite; }
    .loading-title { font-size: 16px; font-weight: 600; letter-spacing: -0.2px; }
    .loading-sub { font-size: 13px; color: var(--muted); }

    /* Home screen */
    .home-screen { flex: 1; display: flex; flex-direction: column; gap: 10px; padding-top: 4px; overflow-y: auto; }
    .stage-card { background: var(--surface); border: 0.5px solid var(--border); border-radius: 16px; padding: 16px; display: flex; align-items: center; gap: 14px; cursor: pointer; transition: opacity 0.1s; }
    .stage-card:active { opacity: 0.7; }
    .stage-card.disabled { opacity: 0.4; cursor: not-allowed; }
    .stage-icon { font-size: 28px; flex-shrink: 0; width: 44px; text-align: center; }
    .stage-info { flex: 1; min-width: 0; }
    .stage-title { font-size: 14px; font-weight: 600; letter-spacing: -0.2px; margin-bottom: 3px; }
    .stage-meta { font-size: 11px; color: var(--muted); }
    .stage-arrow { font-size: 16px; color: var(--muted); flex-shrink: 0; }
    .stage-badge { display: inline-block; font-size: 10px; font-weight: 600; padding: 2px 8px; border-radius: 999px; margin-left: 6px; }
    .stage-badge.ready { background: var(--approve-bg); color: var(--approve); }
    .stage-badge.empty { background: rgba(0,0,0,0.06); color: var(--muted); }
  </style>
</head>
<body>
<div class="app" id="app"></div>

<script>
// ── State ──────────────────────────────────────────────────────
const APP_VERSION = 'v39';
let formats = [];
let current = 0;
const approved = [], rejected = [];
let startX = 0, startY = 0, isDragging = false, dragX = 0;

// Stage 2
let scripts = [];       // [{format, script}, ...]
let scriptCurrent = 0;
const approvedScripts = [], rejectedScripts = [];

const DEFAULT_ACCOUNTS = [
  'https://www.tiktok.com/@starvicks51',
  'https://www.tiktok.com/@fluently.kate',
  'https://www.tiktok.com/@lola_englishspeak',
  'https://www.tiktok.com/@keisha.learns'
];

// ── Accounts ──────────────────────────────────────────────────
function loadAccounts() {
  try { const a = localStorage.getItem('kf_accounts'); if (a) return JSON.parse(a); } catch(e) {}
  return [...DEFAULT_ACCOUNTS];
}
function saveAccounts(a) { localStorage.setItem('kf_accounts', JSON.stringify(a)); }
function normaliseUrl(input) {
  input = input.trim();
  if (input.startsWith('https://www.tiktok.com/')) return input;
  if (input.startsWith('@')) return 'https://www.tiktok.com/' + input;
  if (input.includes('tiktok.com/')) return 'https://' + input.replace(/^https?:\/\//, '');
  return 'https://www.tiktok.com/@' + input.replace(/^@/, '');
}
function handleFromUrl(url) { const m = url.match(/@([^/?]+)/); return m ? '@' + m[1] : url; }

// ── Cache ──────────────────────────────────────────────────────
function saveCache(videos) {
  localStorage.setItem('kf_videos', JSON.stringify(videos));
  localStorage.setItem('kf_pulled', new Date().toISOString());
}
function loadCache() {
  try { const v = localStorage.getItem('kf_videos'); const t = localStorage.getItem('kf_pulled'); if (v && t) return { videos: JSON.parse(v), pulled: t }; } catch(e) {}
  return null;
}
function formatPulledDate(iso) {
  const d = new Date(iso);
  return d.toLocaleDateString('en-GB', { day: 'numeric', month: 'short' }) + ', ' + d.toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit' });
}
function formatPosted(iso) {
  if (!iso) return null;
  const d = new Date(iso); if (isNaN(d)) return null;
  const diff = Math.floor((Date.now() - d) / 86400000);
  if (diff === 0) return 'Today'; if (diff === 1) return 'Yesterday';
  if (diff < 7) return diff + 'd ago';
  return d.toLocaleDateString('en-GB', { day: 'numeric', month: 'short' });
}

// ── Header ─────────────────────────────────────────────────────
function headerHTML(pulledAt, countText, showHomeBtn=true, title='Format review') {
  return `
    <div class="header">
      <div class="header-left">
        ${showHomeBtn ? `<button onclick="showHome()" style="background:none;border:none;cursor:pointer;padding:0 0 3px 0;font-size:12px;color:var(--muted);font-family:inherit;display:block;">← Home</button>` : ''}
        <h1>${title}</h1>
        ${countText ? `<div class="total-count" id="total-count">${countText}</div>` : ''}
      </div>
      <div class="header-right">
        <div style="display:flex;align-items:center;gap:10px;">
          <button class="refresh-btn" onclick="triggerRefresh()" id="refresh-btn">
            <span class="refresh-icon" id="refresh-icon">↻</span> Refresh
          </button>
          <button class="icon-btn" onclick="showSettings()">⚙️</button>
        </div>
        <span class="last-pulled" id="last-pulled">${pulledAt ? 'Last pulled: ' + formatPulledDate(pulledAt) : 'Never pulled'}</span>
      </div>
    </div>`;
}

// ── Stage 1: Format card UI ────────────────────────────────────
function showCardUI(pulledAt) {
  current = 0; approved.length = 0; rejected.length = 0;
  document.getElementById('app').innerHTML = `
    ${headerHTML(pulledAt, formats.length + ' videos to review', true, 'Format review')}
    <div class="progress-bar"><div class="progress-fill" id="progress" style="width:${100/formats.length}%"></div></div>
    <div class="card-area">
      <div class="card-stack">
        <div class="deck-card deck-card-3"></div>
        <div class="deck-card deck-card-2"></div>
        <div class="card" id="card">
          <div class="stamp approve" id="stamp-a">APPROVE</div>
          <div class="stamp reject" id="stamp-r">SKIP</div>
          <div class="card-bg-overlay" id="bg-overlay"></div>
          <div class="video-frame" id="video-frame"><div class="video-loading"><div class="spinner"></div><span>Loading...</span></div></div>
          <div class="meta" id="meta"></div>
        </div>
      </div>
    </div>
    <div style="display:flex;gap:12px;padding:12px 10px 0;flex-shrink:0;">
      <button onclick="swipe('left')" style="flex:1;padding:14px;border-radius:14px;font-size:14px;font-weight:600;border:0.5px solid var(--border);background:var(--surface);color:var(--reject);cursor:pointer;font-family:inherit;">✕ Skip</button>
      <button onclick="swipe('right')" style="flex:1;padding:14px;border-radius:14px;font-size:14px;font-weight:600;border:none;background:var(--approve);color:#fff;cursor:pointer;font-family:inherit;">✓ Approve</button>
    </div>`;
  attachTouchEvents();
  document.onkeydown = (e) => { if (e.key === 'ArrowRight') swipe('right'); else if (e.key === 'ArrowLeft') swipe('left'); };
  loadCard(0);
}

async function loadCard(idx) {
  const vf = document.getElementById('video-frame');
  const meta = document.getElementById('meta');
  const prog = document.getElementById('progress');
  const tc = document.getElementById('total-count');
  const f = formats[idx];
  if (prog) prog.style.width = `${((idx+1)/formats.length)*100}%`;
  if (tc) tc.textContent = `${idx+1} / ${formats.length} videos`;
  vf.innerHTML = '<div class="video-loading"><div class="spinner"></div><span>Loading...</span></div>';
  const posted = formatPosted(f.created);
  meta.innerHTML = `
    <div class="meta-top">
      <div class="meta-top-left">
        <span class="badge">@${f.author || 'tiktok'}</span>
        ${posted ? `<span class="posted-date">${posted}</span>` : ''}
      </div>
      <a class="comments-link" href="${f.url}" target="_blank">💬 Comments</a>
    </div>
    <div class="card-title">${f.title}</div>
    <div class="views">♥ ${f.views} likes &nbsp;·&nbsp; 💬 ${f.comments || '–'} comments</div>`;
  if (f.thumbnail) showThumb(vf, f.thumbnail, f.url);
  else {
    try {
      const res = await fetch(`/api/oembed?url=${encodeURIComponent(f.url)}`);
      const data = await res.json();
      if (data.thumbnail_url) showThumb(vf, data.thumbnail_url, f.url);
      else showFallback(vf, f.url);
    } catch { showFallback(vf, f.url); }
  }
}

function showThumb(vf, thumb, url) {
  vf.innerHTML = `
    <a href="${url}" target="_blank" style="display:block;width:100%;height:100%;position:relative;text-decoration:none;">
      <img src="${thumb}" style="width:100%;height:100%;object-fit:cover;display:block;" />
      <div style="position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;background:rgba(0,0,0,0.35);">
        <div style="width:56px;height:56px;background:rgba(255,255,255,0.95);border-radius:50%;display:flex;align-items:center;justify-content:center;">
          <div style="width:0;height:0;border-style:solid;border-width:10px 0 10px 20px;border-color:transparent transparent transparent #000;margin-left:4px;"></div>
        </div>
        <span style="color:#fff;font-size:13px;font-weight:600;background:rgba(0,0,0,0.5);padding:5px 14px;border-radius:999px;">Watch on TikTok</span>
      </div>
    </a>`;
}
function showFallback(vf, url) {
  vf.innerHTML = `<div class="video-loading"><span>Preview unavailable</span><a class="watch-link" href="${url}" target="_blank">Watch on TikTok →</a></div>`;
}

// ── Stage 1: Swipe ─────────────────────────────────────────────
function swipe(dir) {
  if (current >= formats.length) return;
  const card = document.getElementById('card');
  card.classList.add('animating', dir === 'right' ? 'fly-right' : 'fly-left');
  if (dir === 'right') approved.push(formats[current]);
  else rejected.push(formats[current]);
  current++;
  setTimeout(() => {
    card.classList.remove('animating','fly-right','fly-left');
    card.style.transform = '';
    ['stamp-a','stamp-r','bg-overlay'].forEach(id => { const el = document.getElementById(id); if (el) el.style.opacity = 0; });
    if (current >= formats.length) { saveApprovedFormats(approved); showStage1Done(); }
    else loadCard(current);
  }, 400);
}

// ── Stage 1: Done ──────────────────────────────────────────────
function showStage1Done() {
  const pulled = localStorage.getItem('kf_pulled');
  document.getElementById('app').innerHTML = `
    ${headerHTML(pulled, null, true, 'Format review')}
    <div class="done">
      <div class="check">✓</div>
      <h2>Formats reviewed</h2>
      <p>${approved.length} approved · ${rejected.length} skipped</p>
      ${approved.length > 0 ? `
        <div class="approved-list">
          ${approved.map(f => `<div class="approved-item"><span class="t">${f.title}</span><span class="v">♥ ${f.views}</span></div>`).join('')}
        </div>
        <button class="btn-primary" onclick="startScriptGeneration()">Continue to scripts →</button>
      ` : '<p style="color:var(--muted);font-size:14px;margin-bottom:16px;">No formats approved.</p>'}
      <button class="btn-secondary" onclick="reviewFormatsAgain()">Review again</button>

async function startScriptGeneration() {
  const cached = loadGeneratedScripts();
  if (cached && cached.length > 0) { scripts = cached; showScriptUI(); return; }
  const pulled = localStorage.getItem('kf_pulled');
  document.getElementById('app').innerHTML = `
    ${headerHTML(pulled, null, true, 'Script review')}
    <div class="loading-screen">
      <div class="loading-spinner"></div>
      <div class="loading-title" id="loading-title">Transcribing videos...</div>
      <div class="loading-sub" id="loading-sub">This may take a minute</div>
    </div>`;

  const setStatus = (title, sub) => {
    const t = document.getElementById('loading-title');
    const s = document.getElementById('loading-sub');
    if (t) t.textContent = title;
    if (s) s.textContent = sub;
  };

  try {
    // Step 1: Transcribe all approved videos
    setStatus('Transcribing videos...', `0 / ${approved.length} done`);
    const transcriptRes = await fetch('/api/transcript', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ urls: approved.map(f => f.url) })
    });
    const transcriptData = await transcriptRes.json();
    const transcripts = transcriptData.transcripts || {};

    // Step 2: Generate script for each approved video
    scripts = [];
    for (let i = 0; i < approved.length; i++) {
      const f = approved[i];
      setStatus(`Generating script ${i+1} of ${approved.length}...`, f.title.slice(0, 50) + '...');
      const genRes = await fetch('/api/generate', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          transcript: transcripts[f.url] || '',
          caption: f.title,
          author: f.author
        })
      });
      const genData = await genRes.json();
      scripts.push({ format: f, script: genData.script || '', transcript: transcripts[f.url] || '' });
    }

    // Step 3: Show script review
    saveGeneratedScripts(scripts);
    showScriptUI();

  } catch (err) {
    console.error(err);
    document.getElementById('app').innerHTML = `
      ${headerHTML(null, null, true, 'Generate videos')}
      <div class="done">
        <div class="check">⚠️</div>
        <h2>Something went wrong</h2>
        <p>${err.message}</p>
        <button class="btn-primary" onclick="startScriptGeneration()">Try again</button>
        <button class="btn-secondary" onclick="showStage1Done()">Back</button>
      </div>`;
  }
}

function formatTranscript(text) {
  if (!text) return 'No transcript available.';
  // Split on sentence endings followed by space/caps, clean up
  return text
    .replace(/([.!?])\s+([A-Z])/g, '$1\n$2')
    .replace(/([.!?])\s+(It means|Means|That means)/g, '$1\n$2')
    .trim();
}

  const link = document.getElementById('s-link');

}

function swipeScript(dir) {
  if (scriptCurrent >= scripts.length) return;
  const card = document.getElementById('s-card');
  card.classList.add('animating', dir === 'right' ? 'fly-right' : 'fly-left');
  if (dir === 'right') approvedScripts.push(scripts[scriptCurrent]);
  else rejectedScripts.push(scripts[scriptCurrent]);
  scriptCurrent++;
  setTimeout(() => {
    card.classList.remove('animating','fly-right','fly-left');
    card.style.transform = '';
    ['s-stamp-a','s-stamp-r','s-bg-overlay'].forEach(id => { const el = document.getElementById(id); if (el) el.style.opacity = 0; });
    if (scriptCurrent >= scripts.length) { saveApprovedScripts(approvedScripts); showStage2Done(); }
    else loadScriptCard(scriptCurrent);
  }, 400);
}

function attachScriptTouchEvents() {
  const card = document.getElementById('s-card');
  const swipeZone = document.getElementById('s-swipe-zone');
  if (!card || !swipeZone) return;
  let sX = 0, sY = 0, dragging = false, dX = 0;

  // Only start swipe detection from the swipe zone (thumb + source bar)
  swipeZone.addEventListener('touchstart', e => {
    sX = e.touches[0].clientX; sY = e.touches[0].clientY;
    dragging = true; dX = 0;
  }, { passive: true });

  // Move can propagate from anywhere on the card
  card.addEventListener('touchmove', e => {
    if (!dragging) return;
    dX = e.touches[0].clientX - sX;
    const dY = e.touches[0].clientY - sY;
    if (Math.abs(dX) < Math.abs(dY) && Math.abs(dX) < 10) { dragging = false; return; }
    card.style.transform = `translateX(${dX}px) rotate(${dX * 0.06}deg)`;
    const progress = Math.abs(dX) > 30 ? Math.min((Math.abs(dX) - 30) / 70, 1) : 0;
    const sa = document.getElementById('s-stamp-a');
    const sr = document.getElementById('s-stamp-r');
    const ov = document.getElementById('s-bg-overlay');
    if (sa) sa.style.opacity = dX > 30 ? progress : 0;
    if (sr) sr.style.opacity = dX < -30 ? progress : 0;
    if (ov) { ov.style.background = dX > 30 ? 'rgba(29,158,117,0.15)' : dX < -30 ? 'rgba(226,75,74,0.15)' : 'transparent'; ov.style.opacity = progress; }
  }, { passive: true });

  card.addEventListener('touchend', () => {
    if (!dragging) return; dragging = false;
    if (dX > 80) swipeScript('right');
    else if (dX < -80) swipeScript('left');
    else {
      card.style.transform = '';
      ['s-stamp-a','s-stamp-r','s-bg-overlay'].forEach(id => { const el = document.getElementById(id); if (el) el.style.opacity = 0; });
    }
  });
}

let generatedVideos = [];

// kie.ai status values that mean "still running"
const KIE_PENDING = new Set(['waiting', 'queuing', 'generating', 'processing']);

// Render the Omni prompt text to a PNG (the "image-prompt hack").
// Black text on white, ~1200x900, word-wrapped. Returns base64 (no data: prefix).
function renderPromptToPng(promptText) {
  const W = 1200, H = 900;
  const canvas = document.createElement('canvas');
  canvas.width = W; canvas.height = H;
  const ctx = canvas.getContext('2d');
  ctx.fillStyle = '#ffffff';
  ctx.fillRect(0, 0, W, H);
  ctx.fillStyle = '#000000';
  ctx.font = '24px Arial, sans-serif';
  ctx.textBaseline = 'top';

  const margin = 50;
  const maxWidth = W - margin * 2;
  const lineHeight = 34;
  let y = 40;

  const wrapLine = (text) => {
    const words = text.split(' ');
    const lines = [];
    let cur = '';
    for (const word of words) {
      const test = cur ? cur + ' ' + word : word;
      if (ctx.measureText(test).width > maxWidth && cur) {
        lines.push(cur);
        cur = word;
      } else {
        cur = test;
      }
    }
    if (cur) lines.push(cur);
    return lines;
  };

  for (const paragraph of promptText.split('\n')) {
    if (paragraph.trim() === '') { y += 18; continue; }
    for (const line of wrapLine(paragraph)) {
      ctx.fillText(line, margin, y);
      y += lineHeight;
    }
  }

  // strip the "data:image/png;base64," prefix
  return canvas.toDataURL('image/png').split(',')[1];
}

// Split a script into N clips as evenly as possible, snapping to sentence/word breaks
function splitScriptIntoClips(script, numClips) {
  if (numClips <= 1) return [script];
  // Break into sentence-ish units (keep the delimiter)
  const units = script.match(/[^.!?]+[.!?]*\s*/g) || [script];
  // If too few sentences to split, fall back to word chunks
  if (units.length < numClips) {
    const words = script.trim().split(/\s+/);
    const per = Math.ceil(words.length / numClips);
    const parts = [];
    for (let i = 0; i < numClips; i++) parts.push(words.slice(i*per, (i+1)*per).join(' '));
    return parts.filter(p => p.trim());
  }
  // Distribute sentences across clips as evenly as possible
  const perClip = Math.ceil(units.length / numClips);
  const parts = [];
  for (let i = 0; i < numClips; i++) {
    parts.push(units.slice(i*perClip, (i+1)*perClip).join('').trim());
  }
  return parts.filter(p => p.trim());
}

async function safeGenerate() {
  const btn = document.getElementById('generate-btn');
  if (btn) { btn.textContent = 'Starting…'; }
  try {
    await generateVideos();

    alert('Generate failed: ' + (e && e.message ? e.message : e));
    if (btn) { btn.textContent = 'Generate videos →'; }
  }
}

async function generateVideos() {
  const pulled = localStorage.getItem('kf_pulled');

  // Always reload approved scripts from storage so the array is never stale/empty
  const savedScripts = loadApprovedScripts() || [];
  const validScripts = savedScripts.filter(s => s && s.format);
  if (!validScripts.length) {
    document.getElementById('app').innerHTML = `
      ${headerHTML(pulled, null, true, 'Generate videos')}
      <div class="loading-screen">
        <div style="font-size:40px;margin-bottom:16px;">📝</div>
        <div style="font-weight:600;margin-bottom:8px;">No approved scripts yet</div>
        <div style="color:var(--muted);font-size:13px;margin-bottom:24px;max-width:300px;text-align:center;">
          Pull fresh videos, approve a format, then approve a script — then come back here to generate.
        </div>
        <button class="btn-primary" onclick="showHome()">← Start from Home</button>
      </div>`;
    return;
  }
  // Repopulate the approvedScripts array in place (it's a const — can't reassign)
  approvedScripts.length = 0;
  validScripts.forEach(s => approvedScripts.push(s));
  // Fresh generation — clear any stale generated-video cache
  ['kf_generated_videos','kf_generated_videos_date'].forEach(k=>localStorage.removeItem(k));
  generatedVideos = [];
  document.getElementById('app').innerHTML = `
    ${headerHTML(pulled, null, true, 'Generate videos')}
    <div class="loading-screen">
      <div class="loading-spinner"></div>
      <div class="loading-title" id="loading-title">Building Omni prompts...</div>
      <div class="loading-sub" id="loading-sub">Submitting to kie.ai — ~2 min per video</div>
    </div>`;

  const setStatus = (title, sub) => {
    const t = document.getElementById('loading-title');
    const s = document.getElementById('loading-sub');
    if (t) t.textContent = title;
    if (s) s.textContent = sub;
  };

  try {
    // PHASE 1: For each script — watch video, decide clip count, build one prompt per clip
    const prepared = [];
    for (let i = 0; i < approvedScripts.length; i++) {
      const s = approvedScripts[i];
      const scriptText = s.script || s.text || s.katie_script || '';

      // 1a. Require the source video; get the REAL motion breakdown + duration
      let motionBreakdown = null;
      let duration = 0;
      if (!s.format?.videoFile) {
        throw new Error(`No video file for @${s.format?.author || '?'} — this format was pulled before video download was enabled. Reset app data and pull fresh.`);
      }
      setStatus(`Watching video ${i+1} of ${approvedScripts.length}...`, '@' + s.format.author);
      const ar = await fetch('/api/omni', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ action: 'analyze', videoFile: s.format.videoFile, script: scriptText })
      });
      const ad = await ar.json();
      if (!ar.ok || ad.error) {
        throw new Error(`Analyze failed (${ar.status}): ${ad.error || 'unknown'}`);
      }
      if (!ad.motionBreakdown) {
        throw new Error('Analyze returned no motion breakdown');
      }
      motionBreakdown = ad.motionBreakdown;
      duration = ad.duration || 0;

      // 1b. Decide clip count: <=10s → 1, 10-25s → 2, >25s → 3
      const numClips = duration > 25 ? 3 : (duration > 10 ? 2 : 1);
      const scriptParts = splitScriptIntoClips(scriptText, numClips);

      // 1c. Build one Omni prompt per clip
      for (let c = 0; c < scriptParts.length; c++) {
        setStatus(`Writing prompt ${i+1}.${c+1} (clip ${c+1}/${numClips})...`, '@' + s.format.author);
        const pr = await fetch('/api/omni', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            action: 'prompt',
            script: scriptParts[c],
            thumbnail: s.format?.thumbnail || null,
            motionBreakdown,
            clipInfo: numClips > 1 ? { index: c+1, total: numClips } : null
          })
        });
        const pd = await pr.json();
        if (!pr.ok || pd.error) throw new Error(`Prompt (${pr.status}): ${pd.error || JSON.stringify(pd)}`);
        prepared.push({
          scriptObj: s,
          promptText: pd.promptText,
          clipLabel: numClips > 1 ? `Clip ${c+1} of ${numClips}` : null,
          videoIndex: i
        });
      }
    }

    // Hand off to the review screen — generation happens only after approval
    window.__preparedPrompts = prepared;
    savePreparedPrompts(prepared);
    showPromptReview(prepared);
    return;
  } catch (err) {
    document.getElementById('app').innerHTML = `
      ${headerHTML(localStorage.getItem('kf_pulled'), null, true, 'Generate videos')}
      <div class="loading-screen">
        <div style="font-size:40px;margin-bottom:16px;">⚠️</div>
        <div style="font-weight:600;margin-bottom:8px;">Something went wrong</div>
        <div style="color:var(--muted);font-size:13px;margin-bottom:24px;max-width:300px;text-align:center;">${err.message}</div>
        <button class="btn-secondary" onclick="generateVideos()">Try again</button>
        <button class="btn-secondary" onclick="showHome()">← Home</button>
      </div>`;
    return;
  }
}

// Review screen: show each assembled prompt read-only with Approve/Skip

  window.__promptApproved = approved;
  const pulled = localStorage.getItem('kf_pulled');

  const render = () => {
    document.getElementById('app').innerHTML = `
      ${headerHTML(pulled, null, true, 'Review prompts')}
      <div style="flex:1;min-height:0;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:16px 14px 120px;">
        <div style="font-size:13px;color:var(--muted);margin-bottom:14px;">
          Review each Omni prompt before generating. Only approved ones will be sent (each costs a generation).
        </div>
        ${prepared.map((p, i) => `
          <div style="border:0.5px solid var(--border);border-radius:14px;padding:14px;margin-bottom:12px;${approved.has(i)?'':'opacity:0.45;'}">
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;">
              <span style="font-size:13px;font-weight:600;">@${p.scriptObj.format.author}${p.clipLabel ? ` · <span style="color:var(--accent,#6C5CE7);">${p.clipLabel}</span>` : ''}</span>
            </div>
            <pre style="white-space:pre-wrap;font-family:ui-monospace,monospace;font-size:11px;line-height:1.45;color:#333;background:#FAFAFA;border-radius:8px;padding:10px;margin:0 0 10px;overflow:visible;">${(p.promptText||'').replace(/</g,'&lt;')}</pre>
            <button onclick="togglePromptApprove(${i})" class="btn-secondary" style="${approved.has(i)?'border-color:var(--approve);color:var(--approve);':'border-color:var(--reject);color:var(--reject);'}">
              ${approved.has(i) ? '✓ Will generate — tap to skip' : '✕ Skipped — tap to include'}
            </button>
          </div>`).join('')}
        <button class="btn-primary" onclick="generateApprovedPrompts()" style="margin-top:8px;">
          Generate approved (${approved.size}) →
        </button>
        <button class="btn-secondary" onclick="showHome()">← Home</button>
        <button onclick="reanalyzeFromScratch()" style="background:none;border:none;color:var(--muted);font-size:12px;text-decoration:underline;cursor:pointer;font-family:inherit;display:block;margin:14px auto 0;">↻ Re-analyze from scratch</button>
      </div>`;
  };
  window.__renderPromptReview = render;
  render();
}

function togglePromptApprove(i) {
  const set = window.__promptApproved;
  if (set.has(i)) set.delete(i); else set.add(i);
  saveApprovedPromptIdx(set);
  window.__renderPromptReview();
}

// Discard cached prompts/analysis and rebuild from scratch (e.g. after a prompt-logic change)
function reanalyzeFromScratch() {
  if (!confirm('Re-analyze the video and rebuild prompts from scratch? This re-runs motion analysis and costs a bit of time.')) return;
  ['kf_prepared_prompts','kf_prepared_prompts_fp','kf_prompt_approved_idx'].forEach(k => localStorage.removeItem(k));
  generateVideos();
}

// Generate only the approved prepared prompts
async function generateApprovedPrompts() {
  const prepared = window.__preparedPrompts || [];
  const approvedIdx = [...(window.__promptApproved || [])].sort((a,b)=>a-b);
  if (!approvedIdx.length) { alert('Approve at least one prompt to generate.'); return; }
  const toGen = approvedIdx.map(i => prepared[i]);

  const pulled = localStorage.getItem('kf_pulled');
  document.getElementById('app').innerHTML = `
    ${headerHTML(pulled, null, true, 'Generate videos')}
    <div class="loading-screen">
      <div class="spinner"></div>
      <div id="gen-status" style="font-weight:600;margin-top:16px;">Starting...</div>
      <div id="gen-sub" style="color:var(--muted);font-size:13px;margin-top:4px;"></div>
    </div>`;
  const setStatus = (m, sub='') => {
    const a=document.getElementById('gen-status'), b=document.getElementById('gen-sub');
    if(a)a.textContent=m; if(b)b.textContent=sub;
  };

  try {
    const results = [];
    for (let i = 0; i < toGen.length; i++) {
      const p = toGen[i];
      setStatus(`Rendering ${i+1} of ${toGen.length}...`, '@' + p.scriptObj.format.author);
      const promptPng = renderPromptToPng(p.promptText);

      setStatus(`Submitting ${i+1} of ${toGen.length}...`, '@' + p.scriptObj.format.author);
      const res = await fetch('/api/omni', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ action: 'generate', promptPng })
      });
      const data = await res.json();
      if (!res.ok || data.error) throw new Error(`Omni (${res.status}): ${data.error || JSON.stringify(data)}`);
      results.push({ taskId: data.taskId, promptText: p.promptText, scriptObj: p.scriptObj, clipLabel: p.clipLabel || null, videoIndex: p.videoIndex, status: 'processing', video_url: null });
    }
    generatedVideos = results;
    await pollGeneratedVideos(setStatus);
  } catch (err) {
    document.getElementById('app').innerHTML = `
      ${headerHTML(pulled, null, true, 'Generate videos')}
      <div class="loading-screen">
        <div style="font-size:40px;margin-bottom:16px;">⚠️</div>
        <div style="font-weight:600;margin-bottom:8px;">Something went wrong</div>
        <div style="color:var(--muted);font-size:13px;margin-bottom:24px;max-width:300px;text-align:center;">${err.message}</div>
        <button class="btn-secondary" onclick="showPromptReview(window.__preparedPrompts, [...(window.__promptApproved||[])])">← Back to review</button>
      </div>`;
  }
}

// Poll all generatedVideos until complete, then show done screen
async function pollGeneratedVideos(setStatus) {
  const results = generatedVideos;
  let attempts = 0;
  while (attempts < 60) {
    await new Promise(r => setTimeout(r, 10000));
    attempts++;
    const pending = results.filter(r => r.status === 'processing');
    const done = results.length - pending.length;
    setStatus(`Generating... (${attempts * 10}s elapsed)`, `${done} / ${results.length} complete`);
    for (const item of pending) {
      try {
        const sr = await fetch(`/api/omni?action=status&taskId=${item.taskId}`);
        const sd = await sr.json();
        if (sd.status === 'success' && sd.videoUrl) {
          item.status = 'completed';
          item.video_url = sd.videoUrl;
        } else if (sd.status === 'fail') {
          item.status = 'failed';
          item.failMsg = sd.failMsg || 'Generation failed';
        }
      } catch(e) { /* keep polling */ }
    }
    if (results.every(r => r.status !== 'processing')) break;
  }
  results.forEach(r => { if (r.status === 'processing') r.status = 'failed'; });
  generatedVideos = results;
  saveGeneratedVideos(results);
  showStage3Done();
}

// Groups completed clips by source video and computes what a Drive send will
// actually upload (clips + stitched copy for multi-clip videos) — shared by
// the button label (accurate preview) and sendAllToDrive (the real send).
function buildDriveGroups() {
  const groupsMap = {};
  generatedVideos.forEach((v, idx) => {
    if (v.status !== 'completed' || !v.video_url) return;
    const key = (v.videoIndex !== undefined && v.videoIndex !== null) ? v.videoIndex : `solo_${idx}`;
    (groupsMap[key] = groupsMap[key] || []).push(v);
  });
  const groups = Object.values(groupsMap).map(clips => {
    clips.sort((a, b) => (a.clipLabel || '').localeCompare(b.clipLabel || ''));
    const author = clips[0]?.scriptObj?.format?.author || 'video';
    return {
      author,
      clips: clips.map((c, i) => ({
        url: c.video_url,
        filename: `katie_${author}_${(c.clipLabel || ('clip' + (i + 1))).replace(/\s+/g, '')}.mp4`
      }))
    };
  });
  const multiClipGroups = groups.filter(g => g.clips.length >= 2).length;
  const totalFiles = groups.reduce((n, g) => n + g.clips.length + (g.clips.length >= 2 ? 1 : 0), 0);
  return { groups, multiClipGroups, totalFiles };
}

function showStage3Done() {
  const pulled = localStorage.getItem('kf_pulled');
  const completed = generatedVideos.filter(v => v.status === 'completed');
  const failed = generatedVideos.filter(v => v.status !== 'completed');

  // Group clips by their source video (videoIndex) so we never mix unrelated videos
  const groups = {};
  generatedVideos.forEach((v, idx) => {
    const key = (v.videoIndex !== undefined && v.videoIndex !== null) ? v.videoIndex : `solo_${idx}`;
    (groups[key] = groups[key] || []).push({ ...v, _idx: idx });
  });

  const groupHTML = Object.values(groups).map(clips => {
    // completed clip URLs in clip order (Clip 1, Clip 2, ...)
    const completedClips = clips
      .filter(c => c.status === 'completed' && c.video_url)
      .sort((a,b) => (a.clipLabel||'').localeCompare(b.clipLabel||''));
    const canStitch = completedClips.length >= 2;
    const author = clips[0]?.scriptObj?.format?.author || 'unknown';

    return `
      <div style="border:0.5px solid var(--border);border-radius:14px;padding:10px;margin-bottom:14px;">
        ${clips.map(v => `
          <div class="video-result" style="margin-bottom:10px;">
            <div class="video-result-head">
              <span class="t">@${v.scriptObj?.format?.author || 'unknown'}${v.clipLabel ? ` · ${v.clipLabel}` : ''}</span>
              ${v.video_url
                ? `<a href="${v.video_url}" target="_blank" download style="font-size:11px;color:#1D9E75;font-weight:600;text-decoration:none;white-space:nowrap;">Download ↓</a>`
                : `<span style="font-size:11px;color:var(--reject);" title="${v.failMsg || ''}">Failed</span>`}
            </div>
            ${v.video_url
              ? `<video src="${v.video_url}" controls playsinline preload="metadata" style="width:100%;border-radius:12px;background:#000;margin-top:8px;max-height:70vh;"></video>`
              : `<div style="font-size:12px;color:var(--reject);margin-top:6px;">${v.failMsg || 'Generation failed'}</div>`}
            <button class="btn-secondary" onclick="regenerateOne(${v._idx})" style="margin-top:8px;font-size:13px;padding:10px;">↻ Regenerate this clip</button>
          </div>`).join('')}
        ${canStitch ? `
          <button class="btn-primary" onclick='stitchGroup(${JSON.stringify(completedClips.map(c=>c.video_url))}, "${author}")' style="margin-top:4px;font-size:14px;">
            🔗 Stitch ${completedClips.length} clips into one video →
          </button>` : ''}
      </div>`;
  }).join('');

  const driveConnected = !!localStorage.getItem('kf_google_refresh_token');
  const { multiClipGroups, totalFiles } = buildDriveGroups();

  document.getElementById('app').innerHTML = `
    ${headerHTML(pulled, null, true, 'Generate videos')}
    <div class="done" style="justify-content:flex-start;">
      <div class="check">🎬</div>
      <h2>Videos ready!</h2>
      <p>${completed.length} clip${completed.length !== 1 ? 's' : ''} generated</p>
      <div class="pills">
        <span class="pill a">${completed.length} done</span>
        ${failed.length > 0 ? `<span class="pill r">${failed.length} failed</span>` : ''}
      </div>
      <div class="video-results" style="width:100%;">
        ${groupHTML}
      </div>
      ${totalFiles > 0 ? `
      <button class="btn-primary" onclick="sendAllToDrive()" style="margin-bottom:8px;">
        ☁️ Send ${totalFiles} file${totalFiles !== 1 ? 's' : ''} to Drive${multiClipGroups ? ` (${completed.length} clip${completed.length !== 1 ? 's' : ''} + ${multiClipGroups} stitched)` : ''}${driveConnected ? '' : ' — connect'}
      </button>` : ''}
      <button class="btn-secondary" onclick="regenerateVideos()">Regenerate all</button>
      <button class="btn-secondary" onclick="showHome()">← Home</button>
    </div>`;
}

// Send every completed clip to the user's chosen Drive folder (via OAuth)
async function sendAllToDrive() {
  const completed = generatedVideos.filter(v => v.status === 'completed' && v.video_url);
  if (!completed.length) { alert('No completed videos to send.'); return; }

  let refreshToken = localStorage.getItem('kf_google_refresh_token');
  if (!refreshToken) {
    if (confirm('Connect your Google account to send videos to Drive?')) {
      window.location.href = '/api/auth';
    }
    return;
  }

  let folderId = localStorage.getItem('kf_drive_folder_id');
  if (folderId === null) {
    const input = prompt("Paste the Google Drive folder ID to upload into (the part of the folder's URL after /folders/). Leave blank to use My Drive root.");
    if (input === null) return; // cancelled
    folderId = input.trim();
    localStorage.setItem('kf_drive_folder_id', folderId);
  }

  // Group completed clips by their source video (videoIndex) — same helper
  // used for the button label, so what's sent always matches what was shown.
  const { groups, multiClipGroups, totalFiles } = buildDriveGroups();
  if (!groups.length) { alert('No completed videos to send.'); return; }

  const pulled = localStorage.getItem('kf_pulled');
  document.getElementById('app').innerHTML = `
    ${headerHTML(pulled, null, true, 'Generate videos')}
    <div class="loading-screen">
      <div class="loading-spinner"></div>
      <div class="loading-title">Sending to Drive...</div>
      <div class="loading-sub">${groups.length} video${groups.length !== 1 ? 's' : ''} · ${totalFiles} file${totalFiles !== 1 ? 's' : ''}${multiClipGroups ? ' (clips + stitched)' : ''} — this can take a minute</div>
    </div>`;

  try {
    const res = await fetch('/api/drive', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ refreshToken, folderId: folderId || null, groups })
    });
    const data = await res.json();
    if (!res.ok || data.error) throw new Error(data.error || 'failed');
    const allResults = (data.groups || []).flatMap(g => g.results || []);
    const okCount = allResults.filter(r => r.ok).length;
    const failCount = allResults.length - okCount;
    alert(`Sent ${okCount} file(s) to Drive.` + (failCount ? ` ${failCount} failed — check the folder ID and try again.` : ''));
  } catch (err) {
    if (/expired|revoked|reconnect/i.test(err.message)) {
      localStorage.removeItem('kf_google_refresh_token');
      if (confirm('Google connection expired. Reconnect now?')) { window.location.href = '/api/auth'; return; }
    } else {
      alert('Send to Drive failed: ' + err.message);
    }
  }
  showStage3Done();
}

// Stitch a group's completed clips (ordered) into one MP4 via the decode service
async function stitchGroup(clipUrls, author) {
  if (!Array.isArray(clipUrls) || clipUrls.length < 2) { alert('Need at least 2 clips to stitch.'); return; }
  const pulled = localStorage.getItem('kf_pulled');
  document.getElementById('app').innerHTML = `
    ${headerHTML(pulled, null, true, 'Generate videos')}
    <div class="loading-screen">
      <div class="loading-spinner"></div>
      <div class="loading-title">Stitching ${clipUrls.length} clips...</div>
      <div class="loading-sub">@${author} — downloading, normalizing, joining</div>
    </div>`;
  try {
    const res = await fetch('/api/omni', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ action: 'stitch', clips: clipUrls })
    });
    if (!res.ok) {
      let msg = res.status;
      try { const j = await res.json(); msg = j.error || msg; } catch {}
      throw new Error(String(msg));
    }
    const blob = await res.blob();
    const url = URL.createObjectURL(blob);
    document.getElementById('app').innerHTML = `
      ${headerHTML(pulled, null, true, 'Generate videos')}
      <div class="done" style="justify-content:flex-start;">
        <div class="check">✅</div>
        <h2>Stitched video ready</h2>
        <p>@${author} · ${clipUrls.length} clips joined</p>
        <div style="width:100%;margin:12px 0;">
          <video src="${url}" controls playsinline style="width:100%;border-radius:12px;background:#000;max-height:70vh;"></video>
        </div>
        <a href="${url}" download="katie_${author}_stitched.mp4" class="btn-primary" style="text-decoration:none;display:block;text-align:center;">Download stitched video ↓</a>
        <button class="btn-secondary" onclick="sendAllToDrive()" style="margin-top:8px;">☁️ Send to Drive</button>
        <button class="btn-secondary" onclick="showStage3Done()">← Back to clips</button>
      </div>`;
  } catch (err) {
    alert('Stitch failed: ' + err.message);
    showStage3Done();
  }
}

async function regenerateOne(idx) {
  const item = generatedVideos[idx];

      <div class="loading-sub" id="loading-sub">@${item.scriptObj?.format?.author || ''}</div>
    </div>`;
  const setStatus = (t, s='') => {
    const a=document.getElementById('loading-title'), b=document.getElementById('loading-sub');
    if(a)a.textContent=t; if(b)b.textContent=s;
  };
  try {
    const promptPng = renderPromptToPng(item.promptText);

    const res = await fetch('/api/omni', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },

  } catch (err) {
    alert('Regenerate failed: ' + err.message);

// ── Refresh ────────────────────────────────────────────────────
async function triggerRefresh() {
  clearAllApproved();
  const icon = document.getElementById('refresh-icon');
  const btn = document.getElementById('refresh-btn');
  const lastLabel = document.getElementById('last-pulled');
  const accounts = loadAccounts();
  if (accounts.length === 0) { alert('No accounts to scrape. Add some in ⚙️ Settings first.'); return; }
  if (icon) icon.classList.add('spinning');
  if (btn) btn.disabled = true;
  if (lastLabel) lastLabel.textContent = 'Starting scrape...';
  try {
    const startRes = await fetch('/api/apify?action=start', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ profiles: accounts }) });
    const startData = await startRes.json();
    const runId = startData.runId;
    if (!runId) throw new Error('Failed to start Apify run');
    let datasetId = null, attempts = 0;
    while (attempts < 60) {
      await new Promise(r => setTimeout(r, 5000)); attempts++;
      if (lastLabel) lastLabel.textContent = `Scraping... (${attempts * 5}s)`;
      const statusRes = await fetch(`/api/apify?action=status&runId=${runId}`);
      const statusData = await statusRes.json();
      if (statusData.status === 'SUCCEEDED') { datasetId = statusData.datasetId; break; }
      if (statusData.status === 'FAILED' || statusData.status === 'ABORTED') throw new Error('Apify run failed');
    }
    if (!datasetId) throw new Error('Timed out');
    if (lastLabel) lastLabel.textContent = 'Loading videos...';
    const resultsRes = await fetch(`/api/apify?action=results&datasetId=${datasetId}`);
    const resultsData = await resultsRes.json();
    if (!resultsData.videos || resultsData.videos.length === 0) { if (icon) icon.classList.remove('spinning'); if (btn) btn.disabled = false; if (lastLabel) lastLabel.textContent = 'No videos found'; return; }
    formats = resultsData.videos.map(v => ({
      title: v.title || 'No caption',
      views: v.views > 1000000 ? (v.views/1000000).toFixed(1)+'M' : v.views > 1000 ? Math.round(v.views/1000)+'K' : String(v.views || 0),
      comments: v.comments > 1000 ? Math.round(v.comments/1000)+'K' : String(v.comments || 0),
      url: v.url, thumbnail: v.thumbnail, author: v.author, created: v.created,
      videoFile: v.videoFile || ''
    }));
    saveCache(formats);
    showCardUI(localStorage.getItem('kf_pulled'));
  } catch (err) {
    if (icon) icon.classList.remove('spinning');
    if (btn) btn.disabled = false;
    if (lastLabel) lastLabel.textContent = err.message.length < 40 ? err.message : 'Refresh failed — try again';
    console.error(err);
  }
}

// ── Stage 1 touch events ───────────────────────────────────────
function attachTouchEvents() {
  const card = document.getElementById('card');
  if (!card) return;
  card.addEventListener('touchstart', e => { startX = e.touches[0].clientX; startY = e.touches[0].clientY; isDragging = true; dragX = 0; }, { passive: true });
  card.addEventListener('touchmove', e => {
    if (!isDragging) return;
    dragX = e.touches[0].clientX - startX;
    const dragY = e.touches[0].clientY - startY;
    if (Math.abs(dragX) < Math.abs(dragY) && Math.abs(dragX) < 10) return;
    card.style.transform = `translateX(${dragX}px) rotate(${dragX * 0.06}deg)`;
    const progress = Math.abs(dragX) > 30 ? Math.min((Math.abs(dragX) - 30) / 70, 1) : 0;
    const sa = document.getElementById('stamp-a'); const sr = document.getElementById('stamp-r'); const ov = document.getElementById('bg-overlay');
    if (sa) sa.style.opacity = dragX > 30 ? progress : 0;
    if (sr) sr.style.opacity = dragX < -30 ? progress : 0;
    if (ov) { ov.style.background = dragX > 30 ? 'rgba(29,158,117,0.15)' : dragX < -30 ? 'rgba(226,75,74,0.15)' : 'transparent'; ov.style.opacity = progress; }
  }, { passive: true });
  card.addEventListener('touchend', () => {
    if (!isDragging) return; isDragging = false;
    if (dragX > 80) swipe('right');
    else if (dragX < -80) swipe('left');
    else { card.style.transform = ''; ['stamp-a','stamp-r','bg-overlay'].forEach(id => { const el = document.getElementById(id); if (el) el.style.opacity = 0; }); }
  });
}

// Identifies which set of approved scripts a cached result belongs to, so we
// only reuse cached prompts/videos when they still match what's approved now.
function scriptsFingerprint(scripts) {
  return (scripts || []).map(s => (s.format?.author || '') + '|' + (s.script || s.text || s.katie_script || '')).join('::');
}
function savePreparedPrompts(prepared) {
  localStorage.setItem('kf_prepared_prompts', JSON.stringify(prepared));
  localStorage.setItem('kf_prepared_prompts_fp', scriptsFingerprint(approvedScripts));
}
function loadPreparedPrompts() {
  try {
    const v = localStorage.getItem('kf_prepared_prompts');
    if (v) return JSON.parse(v);
  } catch(e) {}
  return null;
}
function saveApprovedPromptIdx(idxSet) {
  localStorage.setItem('kf_prompt_approved_idx', JSON.stringify([...idxSet]));
}
function clearAllApproved() {
  ['kf_approved_formats','kf_approved_formats_date',
   'kf_approved_scripts','kf_approved_scripts_date',
   'kf_generated_scripts','kf_generated_scripts_date',
   'kf_generated_videos','kf_generated_videos_date','kf_generated_videos_fp',
   'kf_prepared_prompts','kf_prepared_prompts_fp','kf_prompt_approved_idx'].forEach(k => localStorage.removeItem(k));
}
function shortDate(iso) {
  if (!iso) return '';
  const d = new Date(iso);
  return d.toLocaleDateString('en-GB', { day: 'numeric', month: 'short' });
}

// ── Home screen ────────────────────────────────────────────────
function showHome() {
  // Save any in-progress approvals before leaving
  if (approved.length > 0) saveApprovedFormats(approved);
  if (approvedScripts.length > 0) saveApprovedScripts(approvedScripts);
  const pulled = localStorage.getItem('kf_pulled');
  const cache = loadCache();

  const af = loadApprovedFormats();
  const as_ = loadApprovedScripts();
  const gv = loadGeneratedVideos();
  const afDate = localStorage.getItem('kf_approved_formats_date');
  const asDate = localStorage.getItem('kf_approved_scripts_date');
  const gvDate = localStorage.getItem('kf_generated_videos_date');

  const hasVideos = cache && cache.videos.length > 0;
  const hasFormats = af && af.length > 0;
  const hasScripts = as_ && as_.length > 0;
  const hasGenerated = gv && gv.length > 0;

  document.getElementById('app').innerHTML = `
    ${headerHTML(pulled, null, false)}
    <div class="home-screen">

      <div class="stage-card ${!hasVideos ? 'disabled' : ''}" onclick="${hasVideos ? 'startStage1()' : ''}">
        <div class="stage-icon">🎬</div>
        <div class="stage-info">
          <div class="stage-title">Review formats
            ${hasFormats ? `<span class="stage-badge ready">${af.length} approved</span>` : `<span class="stage-badge empty">Not started</span>`}
          </div>
          <div class="stage-meta">${hasVideos ? `${cache.videos.length} videos from ${shortDate(pulled)}` : 'No videos yet — tap Refresh'}</div>
        </div>
        <div class="stage-arrow">›</div>
      </div>

      <div class="stage-card ${!hasFormats ? 'disabled' : ''}" onclick="${hasFormats ? 'startStage2()' : ''}">
        <div class="stage-icon">✍️</div>
        <div class="stage-info">
          <div class="stage-title">Review scripts
            ${hasScripts ? `<span class="stage-badge ready">${as_.length} approved</span>` : `<span class="stage-badge empty">Not started</span>`}
          </div>
          <div class="stage-meta">${hasFormats ? `${af.length} formats approved · ${shortDate(afDate)}` : 'Complete Stage 1 first'}</div>
        </div>
        <div class="stage-arrow">›</div>
      </div>

      <div class="stage-card ${!hasScripts ? 'disabled' : ''}" onclick="${hasScripts ? 'startStage3()' : ''}">
        <div class="stage-icon">🎥</div>
        <div class="stage-info">
          <div class="stage-title">Generate videos
            ${hasGenerated ? `<span class="stage-badge ready">${gv.length} generated</span>` : `<span class="stage-badge empty">Not started</span>`}
          </div>
          <div class="stage-meta">${hasScripts ? `${as_.length} scripts approved · ${shortDate(asDate)}` : 'Complete Stage 2 first'}</div>
        </div>
        <div class="stage-arrow">›</div>
      </div>

    </div>

    <div style="text-align:center;margin-top:24px;">
      <button onclick="resetAppData()" style="background:none;border:none;color:var(--muted);font-size:12px;text-decoration:underline;cursor:pointer;font-family:inherit;">Reset app data</button>
      <div style="color:var(--muted);font-size:11px;margin-top:8px;opacity:0.6;">${APP_VERSION}</div>
    </div>`;
}

function resetAppData() {
  if (!confirm('Clear all approved formats, scripts, and generated videos? (Your tracked accounts stay.) This fixes a stuck state.')) return;
  ['kf_approved_formats','kf_approved_formats_date','kf_approved_scripts','kf_approved_scripts_date','kf_generated_scripts','kf_generated_scripts_date','kf_generated_videos','kf_generated_videos_date','kf_generated_videos_fp','kf_prepared_prompts','kf_prepared_prompts_fp','kf_prompt_approved_idx'].forEach(k=>localStorage.removeItem(k));
  approved.length = 0; rejected.length = 0;
  approvedScripts.length = 0; rejectedScripts.length = 0;
  scripts = []; generatedVideos = [];
  showHome();
}

function startStage1() {
  const cache = loadCache();
  if (!cache) return;
  formats = cache.videos;
  const savedApproved = loadApprovedFormats();
  if (savedApproved && savedApproved.length > 0) {
    // Already have approvals — show summary
    approved.length = 0;
    savedApproved.forEach(f => approved.push(f));
    rejected.length = 0;
    showStage1Done();
  } else {
    // No approvals yet — go straight to swipe
    approved.length = 0; rejected.length = 0;
    showCardUI(cache.pulled);
  }
}

function startStage2() {
  const savedFormats = loadApprovedFormats();
  if (!savedFormats || savedFormats.length === 0) return;
  approved.length = 0;
  savedFormats.forEach(f => approved.push(f));
  const savedScripts = loadApprovedScripts();
  if (savedScripts && savedScripts.length > 0) {
    // Already have approved scripts — show summary
    approvedScripts.length = 0;
    savedScripts.forEach(s => approvedScripts.push(s));
    rejectedScripts.length = 0;
    showStage2Done();
  } else {
    // No approved scripts yet — go to generation/swipe
    startScriptGeneration();
  }
}

function startStage3() {
  const savedScripts = loadApprovedScripts();
  if (!savedScripts) return;
  approvedScripts.length = 0;
  savedScripts.forEach(s => approvedScripts.push(s));
  const fp = scriptsFingerprint(approvedScripts);

  // Resume 1: videos already fully generated for this exact set of approved scripts
  const cachedVideos = loadGeneratedVideos();
  if (cachedVideos && cachedVideos.length && localStorage.getItem('kf_generated_videos_fp') === fp) {
    generatedVideos = cachedVideos;
    showStage3Done();
    return;
  }

  // Resume 2: prompts already built (analyzed + written) for this exact set — skip
  // straight to review instead of re-running motion analysis + prompt generation.
  const cachedPrepared = loadPreparedPrompts();
  if (cachedPrepared && cachedPrepared.length && localStorage.getItem('kf_prepared_prompts_fp') === fp) {
    window.__preparedPrompts = cachedPrepared;
    let savedIdx = null;
    try {
      const raw = localStorage.getItem('kf_prompt_approved_idx');
      if (raw) savedIdx = JSON.parse(raw);
    } catch(e) {}
    showPromptReview(cachedPrepared, savedIdx);
    return;
  }

  // Nothing usable cached — build fresh (this is the only path that costs analysis + prompt calls)
  generateVideos();
}

// ── Boot ───────────────────────────────────────────────────────
showHome();
</script>
</body>
</html>
