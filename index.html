<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0a0a0a" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Katie Formats" />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icon-192.png" />
  <title>Katie Formats</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0a;
      --surface: #161616;
      --border: rgba(255,255,255,0.08);
      --text: #f0f0f0;
      --muted: #888;
      --approve: #1D9E75;
      --approve-bg: rgba(29,158,117,0.12);
      --reject: #E24B4A;
      --reject-bg: rgba(226,75,74,0.12);
      --accent: #fff;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Segoe UI', sans-serif;
      overflow: hidden;
      -webkit-tap-highlight-color: transparent;
    }

    .app {
      display: flex;
      flex-direction: column;
      height: 100dvh;
      padding: env(safe-area-inset-top, 16px) 16px env(safe-area-inset-bottom, 16px);
      max-width: 480px;
      margin: 0 auto;
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 0 10px;
      flex-shrink: 0;
    }

    .header h1 {
      font-size: 15px;
      font-weight: 600;
      letter-spacing: -0.2px;
    }

    .counter {
      font-size: 12px;
      color: var(--muted);
      font-weight: 500;
    }

    .progress-bar {
      height: 2px;
      background: rgba(255,255,255,0.08);
      border-radius: 2px;
      margin-bottom: 14px;
      flex-shrink: 0;
    }

    .progress-fill {
      height: 100%;
      background: var(--approve);
      border-radius: 2px;
      transition: width 0.4s cubic-bezier(0.4,0,0.2,1);
    }

    .card-area {
      flex: 1;
      position: relative;
      min-height: 0;
      padding-bottom: 16px;
    }

    .card {
      position: absolute;
      inset: 0;
      background: var(--surface);
      border: 0.5px solid var(--border);
      border-radius: 20px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      touch-action: none;
      will-change: transform;
      transition: transform 0.08s ease;
    }

    .card.animating {
      transition: transform 0.38s cubic-bezier(0.4,0,0.2,1), opacity 0.38s ease;
    }

    .card.fly-right { transform: translateX(110%) rotate(12deg) !important; opacity: 0; }
    .card.fly-left  { transform: translateX(-110%) rotate(-12deg) !important; opacity: 0; }

    .deck-card {
      position: absolute;
      left: 0; right: 0; bottom: 0;
      background: var(--surface);
      border: 0.5px solid var(--border);
      border-radius: 20px;
      pointer-events: none;
      transition: transform 0.38s cubic-bezier(0.4,0,0.2,1);
    }

    .deck-card-2 {
      height: calc(100% - 16px);
      transform: translateY(12px) scale(0.94);
      opacity: 0.5;
      z-index: 0;
    }

    .deck-card-3 {
      height: calc(100% - 24px);
      transform: translateY(20px) scale(0.88);
      opacity: 0.3;
      z-index: -1;
    }

    .card { z-index: 2; }

    .video-frame {
      flex: 1;
      min-height: 0;
      background: #000;
      position: relative;
    }

    .video-frame iframe {
      width: 100%;
      height: 100%;
      border: none;
      display: block;
    }

    .video-loading {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
      background: #111;
      color: var(--muted);
      font-size: 13px;
    }

    .video-loading .spinner {
      width: 24px;
      height: 24px;
      border: 2px solid rgba(255,255,255,0.1);
      border-top-color: var(--approve);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .watch-link {
      color: #5DCAA5;
      font-size: 12px;
      text-decoration: none;
      padding: 6px 14px;
      border: 0.5px solid #5DCAA5;
      border-radius: 999px;
      margin-top: 6px;
    }

    .meta {
      padding: 12px 14px 14px;
      flex-shrink: 0;
      border-top: 0.5px solid var(--border);
    }

    .badge {
      display: inline-block;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.4px;
      text-transform: uppercase;
      padding: 3px 9px;
      border-radius: 999px;
      margin-bottom: 7px;
    }

    .card-title {
      font-size: 14px;
      font-weight: 600;
      line-height: 1.4;
      margin-bottom: 5px;
      letter-spacing: -0.1px;
    }

    .views {
      font-size: 11px;
      color: var(--muted);
      margin-bottom: 8px;
    }

    .katie-angle {
      background: rgba(255,255,255,0.04);
      border: 0.5px solid var(--border);
      border-radius: 10px;
      padding: 8px 10px;
      font-size: 11px;
      color: var(--muted);
      line-height: 1.5;
    }

    .katie-angle strong {
      color: var(--text);
      font-weight: 600;
    }

    .stamp {
      position: absolute;
      top: 28px;
      font-size: 30px;
      font-weight: 900;
      padding: 8px 18px;
      border-radius: 8px;
      opacity: 0;
      pointer-events: none;
      z-index: 10;
      letter-spacing: 3px;
      text-transform: uppercase;
    }

    .stamp.approve { left: 20px; color: #1D9E75; border: 4px solid #1D9E75; transform: rotate(-15deg); }
    .stamp.reject  { right: 20px; color: #E24B4A; border: 4px solid #E24B4A; transform: rotate(15deg); }

    .card-bg-overlay {
      position: absolute;
      inset: 0;
      border-radius: 20px;
      pointer-events: none;
      z-index: 1;
      opacity: 0;
    }

    .actions {
      display: flex;
      gap: 12px;
      padding: 10px 0 4px;
      flex-shrink: 0;
    }

    .btn {
      flex: 1;
      padding: 14px;
      border-radius: 14px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      border: 0.5px solid var(--border);
      background: var(--surface);
      color: var(--text);
      transition: transform 0.1s, background 0.15s;
      letter-spacing: -0.2px;
    }

    .btn:active { transform: scale(0.96); }
    .btn-approve { border-color: var(--approve); color: var(--approve); background: var(--approve-bg); }
    .btn-reject  { border-color: var(--reject);  color: var(--reject);  background: var(--reject-bg); }

    .done {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem 1rem;
      gap: 0;
    }

    .done .check { font-size: 48px; margin-bottom: 12px; }
    .done h2 { font-size: 22px; font-weight: 700; margin-bottom: 6px; letter-spacing: -0.4px; }
    .done p { font-size: 14px; color: var(--muted); margin-bottom: 20px; }

    .pills { display: flex; gap: 10px; margin-bottom: 20px; }
    .pill { padding: 6px 18px; border-radius: 999px; font-size: 13px; font-weight: 600; }
    .pill.a { background: var(--approve-bg); color: var(--approve); border: 0.5px solid var(--approve); }
    .pill.r { background: var(--reject-bg);  color: var(--reject);  border: 0.5px solid var(--reject); }

    .approved-list {
      width: 100%;
      border: 0.5px solid var(--border);
      border-radius: 14px;
      overflow: hidden;
      margin-bottom: 16px;
      text-align: left;
    }

    .approved-item {
      padding: 11px 14px;
      border-bottom: 0.5px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
    }

    .approved-item:last-child { border-bottom: none; }
    .approved-item .t { font-size: 13px; font-weight: 500; flex: 1; line-height: 1.3; }
    .approved-item .v { font-size: 11px; color: var(--muted); white-space: nowrap; }

    .btn-generate {
      width: 100%;
      padding: 15px;
      border-radius: 14px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      border: none;
      background: var(--approve);
      color: #fff;
      letter-spacing: -0.2px;
    }

    .btn-generate:active { transform: scale(0.97); }
  </style>
</head>
<body>
<div class="app" id="app">
  <div class="header">
    <h1>Format review</h1>
    <span class="counter" id="counter">1 / 6</span>
  </div>
  <div class="progress-bar"><div class="progress-fill" id="progress" style="width:16.6%"></div></div>

  <div class="card-area" id="card-area">
    <div class="deck-card deck-card-3" id="deck-3"></div>
    <div class="deck-card deck-card-2" id="deck-2"></div>
    <div class="card" id="card">
      <div class="stamp approve" id="stamp-a">APPROVE</div>
      <div class="stamp reject"  id="stamp-r">SKIP</div>
      <div class="card-bg-overlay" id="bg-overlay"></div>
      <div class="video-frame" id="video-frame">
        <div class="video-loading"><div class="spinner"></div><span>Loading video...</span></div>
      </div>
      <div class="meta" id="meta"></div>
    </div>
  </div>

  <div class="actions">
    <button class="btn btn-reject"  onclick="swipe('left')">✕ Skip</button>
    <button class="btn btn-approve" onclick="swipe('right')">✓ Approve</button>
  </div>
</div>

<script>
const formats = [
  {
    title: "Stop saying 'in my opinion' — say this instead",
    type: "Phrase upgrade", views: "292K",
    badge: "rgba(29,158,117,0.15)", badgeText: "#1D9E75",
    katie: "Katie AI teaches you what native speakers actually say — practice it daily",
    url: "https://www.tiktok.com/@fluently.mey/video/7632033783469837598"
  },
  {
    title: "Use modern English — nobody says this anymore",
    type: "Vocabulary upgrade", views: "97.7K",
    badge: "rgba(55,138,221,0.15)", badgeText: "#378ADD",
    katie: "Practice modern phrases with Katie AI so they come out naturally",
    url: "https://www.tiktok.com/@user_123a97/video/7383886098765432321"
  },
  {
    title: "Bad at English? Try these",
    type: "Tip listicle", views: "90.7K",
    badge: "rgba(186,117,23,0.15)", badgeText: "#BA7517",
    katie: "One of those tips: daily speaking practice. That's exactly what Katie AI is for",
    url: "https://www.tiktok.com/@hallohelloann/video/7453834798765432321"
  },
  {
    title: "Go phrasal verbs — used in real sentences",
    type: "Phrasal verbs", views: "45.4K",
    badge: "rgba(83,74,183,0.15)", badgeText: "#7F77DD",
    katie: "Learn phrasal verbs in real context with Katie AI — not from a textbook",
    url: "https://www.tiktok.com/@englicore1/video/7498123456789012345"
  },
  {
    title: "Unlock fluency — what nobody tells you",
    type: "Mindset / tips", views: "37.1K",
    badge: "rgba(153,60,29,0.15)", badgeText: "#D85A30",
    katie: "The real unlock is speaking more. Katie AI gives you a safe space to practice every day",
    url: "https://www.tiktok.com/@alfisyahere/video/7497123456789012345"
  },
  {
    title: "Very vs Too — you're using these wrong",
    type: "Word confusion", views: "26K",
    badge: "rgba(59,109,17,0.15)", badgeText: "#639922",
    katie: "Make mistakes without judgment. Katie AI corrects you and explains why",
    url: "https://www.tiktok.com/@comparelingo/video/7496123456789012345"
  }
];

let current = 0;
const approved = [], rejected = [];
let startX = 0, startY = 0, isDragging = false, dragX = 0;

function updateDeck() {
  const remaining = formats.length - current;
  const d2 = document.getElementById('deck-2');
  const d3 = document.getElementById('deck-3');
  if (d2) d2.style.display = remaining > 1 ? '' : 'none';
  if (d3) d3.style.display = remaining > 2 ? '' : 'none';
}

async function loadCard(idx) {
  const vf = document.getElementById('video-frame');
  const meta = document.getElementById('meta');
  const f = formats[idx];

  vf.innerHTML = '<div class="video-loading"><div class="spinner"></div><span>Loading video...</span></div>';

  meta.innerHTML = `
    <span class="badge" style="background:${f.badge};color:${f.badgeText}">${f.type}</span>
    <p class="card-title">${f.title}</p>
    <p class="views">♥ ${f.views} likes on TikTok</p>
    <div class="katie-angle"><strong>Katie AI angle:</strong> ${f.katie}</div>
  `;

  document.getElementById('counter').textContent = `${idx + 1} / ${formats.length}`;
  document.getElementById('progress').style.width = `${((idx + 1) / formats.length) * 100}%`;

  try {
    const res = await fetch(`/api/oembed?url=${encodeURIComponent(f.url)}`);
    const data = await res.json();
    if (data.thumbnail_url) {
      vf.innerHTML = `
        <a href="${f.url}" target="_blank" style="display:block;width:100%;height:100%;position:relative;text-decoration:none;">
          <img src="${data.thumbnail_url}" style="width:100%;height:100%;object-fit:cover;display:block;" />
          <div style="position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;background:rgba(0,0,0,0.35);">
            <div style="width:56px;height:56px;background:rgba(255,255,255,0.95);border-radius:50%;display:flex;align-items:center;justify-content:center;">
              <div style="width:0;height:0;border-style:solid;border-width:10px 0 10px 20px;border-color:transparent transparent transparent #000;margin-left:4px;"></div>
            </div>
            <span style="color:#fff;font-size:13px;font-weight:600;background:rgba(0,0,0,0.5);padding:5px 14px;border-radius:999px;letter-spacing:0.2px;">Watch on TikTok</span>
          </div>
        </a>`;
    } else { showFallback(vf, f.url); }
  } catch { showFallback(vf, f.url); }
}

function showFallback(vf, url) {
  vf.innerHTML = `<div class="video-loading"><span>Preview unavailable</span><a class="watch-link" href="${url}" target="_blank">Watch on TikTok →</a></div>`;
}

function swipe(dir) {
  if (current >= formats.length) return;
  const card = document.getElementById('card');
  card.classList.add('animating');
  card.classList.add(dir === 'right' ? 'fly-right' : 'fly-left');
  if (dir === 'right') approved.push(formats[current]);
  else rejected.push(formats[current]);
  current++;
  setTimeout(() => {
    card.classList.remove('animating', 'fly-right', 'fly-left');
    card.style.transform = '';
    document.getElementById('stamp-a').style.opacity = 0;
    document.getElementById('stamp-r').style.opacity = 0;
    const ov2 = document.getElementById('bg-overlay');
    if (ov2) ov2.style.opacity = 0;
    if (current >= formats.length) showDone();
    else loadCard(current);
    updateDeck();
  }, 400);
}

function showDone() {
  document.getElementById('app').innerHTML = `
    <div style="padding:12px 0 10px;display:flex;justify-content:space-between;align-items:center;flex-shrink:0">
      <h1 style="font-size:15px;font-weight:600">Format review</h1>
    </div>
    <div class="done">
      <div class="check">✓</div>
      <h2>Review complete</h2>
      <p>${approved.length} format${approved.length !== 1 ? 's' : ''} approved for script generation</p>
      <div class="pills">
        <span class="pill a">${approved.length} approved</span>
        <span class="pill r">${rejected.length} skipped</span>
      </div>
      ${approved.length > 0 ? `
        <div class="approved-list">
          ${approved.map(f => `<div class="approved-item"><span class="t">${f.title}</span><span class="v">${f.views}</span></div>`).join('')}
        </div>
        <button class="btn-generate" onclick="alert('Script generation coming soon — connect Claude API to activate this step.')">Generate scripts →</button>
      ` : '<p style="color:var(--muted);font-size:14px">No formats approved this round.</p>'}
    </div>
  `;
}

const card = document.getElementById('card');

card.addEventListener('touchstart', e => {
  startX = e.touches[0].clientX;
  startY = e.touches[0].clientY;
  isDragging = true;
  dragX = 0;
}, { passive: true });

card.addEventListener('touchmove', e => {
  if (!isDragging) return;
  dragX = e.touches[0].clientX - startX;
  const dragY = e.touches[0].clientY - startY;
  if (Math.abs(dragX) < Math.abs(dragY) && Math.abs(dragX) < 10) return;
  card.style.transform = `translateX(${dragX}px) rotate(${dragX * 0.06}deg)`;
  const sa = document.getElementById('stamp-a');
  const sr = document.getElementById('stamp-r');
  const progress = Math.abs(dragX) > 30 ? Math.min((Math.abs(dragX) - 30) / 70, 1) : 0;
  sa.style.opacity = dragX > 30 ? progress : 0;
  sr.style.opacity = dragX < -30 ? progress : 0;
  const overlay = document.getElementById('bg-overlay');
  if (overlay) {
    overlay.style.background = dragX > 30 ? 'rgba(29,158,117,0.15)' : dragX < -30 ? 'rgba(226,75,74,0.15)' : 'transparent';
    overlay.style.opacity = progress;
  }
}, { passive: true });

card.addEventListener('touchend', () => {
  if (!isDragging) return;
  isDragging = false;
  if (dragX > 80) swipe('right');
  else if (dragX < -80) swipe('left');
  else {
    card.style.transform = '';
    document.getElementById('stamp-a').style.opacity = 0;
    document.getElementById('stamp-r').style.opacity = 0;
    const ov = document.getElementById('bg-overlay');
    if (ov) { ov.style.opacity = 0; }
  }
});

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js');
}

loadCard(0);
updateDeck();
</script>
</body>
</html>
