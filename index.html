<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#F0EEE9" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Katie Formats" />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icon-192.png" />
  <title>Katie Formats</title>
  <!-- v11 -->
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #F0EEE9;
      --surface: #FFFFFF;
      --border: rgba(0,0,0,0.08);
      --text: #1a1a1a;
      --muted: #888;
      --approve: #1D9E75;
      --approve-bg: rgba(29,158,117,0.1);
      --reject: #E24B4A;
      --reject-bg: rgba(226,75,74,0.1);
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Segoe UI', sans-serif;
      overflow: hidden;
      -webkit-tap-highlight-color: transparent;
    }

    .app {
      display: flex;
      flex-direction: column;
      height: 100dvh;
      padding: env(safe-area-inset-top, 16px) 16px env(safe-area-inset-bottom, 20px);
      max-width: 480px;
      margin: 0 auto;
    }

    /* ── Header ── */
    .header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      padding: 12px 0 10px;
      flex-shrink: 0;
    }
    .header-left h1 {
      font-size: 15px;
      font-weight: 600;
      letter-spacing: -0.2px;
    }
    .header-left .total-count {
      font-size: 11px;
      color: var(--muted);
      margin-top: 2px;
    }
    .header-right {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 3px;
    }
    .refresh-btn {
      background: none; border: none; cursor: pointer;
      padding: 0; display: flex; align-items: center; gap: 4px;
      color: var(--text); font-size: 13px; font-weight: 500; font-family: inherit;
    }
    .refresh-btn:active { opacity: 0.5; }
    .refresh-icon { font-size: 16px; line-height: 1; display: inline-block; }
    @keyframes spin-icon { to { transform: rotate(360deg); } }
    .refresh-icon.spinning { animation: spin-icon 0.8s linear infinite; }
    .last-pulled { font-size: 10px; color: var(--muted); }

    /* ── Progress ── */
    .progress-bar {
      height: 2px;
      background: rgba(0,0,0,0.06);
      border-radius: 2px;
      margin-bottom: 12px;
      flex-shrink: 0;
    }
    .progress-fill {
      height: 100%;
      background: var(--approve);
      border-radius: 2px;
      transition: width 0.4s cubic-bezier(0.4,0,0.2,1);
    }

    /* ── Card area — takes all remaining space ── */
    .card-area {
      flex: 1;
      position: relative;
      min-height: 0;
    }
    .card-stack {
      position: absolute;
      top: 0; bottom: 0;
      left: 10px; right: 10px;
    }
    .card {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: var(--surface);
      border: 0.5px solid var(--border);
      border-radius: 20px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      touch-action: none;
      will-change: transform;
      z-index: 2;
      box-shadow: 8px 8px 0 0 #ddd8ce, 14px 14px 0 0 #d0cbc0;
    }
    .card.animating {
      transition: transform 0.38s cubic-bezier(0.4,0,0.2,1), opacity 0.38s ease;
    }
    .card.fly-right { transform: translateX(110%) rotate(12deg) !important; opacity: 0; }
    .card.fly-left  { transform: translateX(-110%) rotate(-12deg) !important; opacity: 0; }

    .deck-card { position: absolute; background: var(--surface); border: 0.5px solid var(--border); border-radius: 20px; pointer-events: none; }
    .deck-card-2 { top: 10px; left: 8px; right: 8px; bottom: 0; opacity: 0.55; z-index: 1; }
    .deck-card-3 { top: 0;   left: 16px; right: 16px; bottom: 0; opacity: 0.3;  z-index: 0; }

    /* ── Video ── */
    .video-frame {
      flex: 1;
      min-height: 0;
      background: #ebebeb;
      position: relative;
    }
    .video-loading {
      position: absolute; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 10px; color: var(--muted); font-size: 13px;
    }
    .video-loading .spinner {
      width: 24px; height: 24px;
      border: 2px solid rgba(0,0,0,0.08);
      border-top-color: var(--approve);
      border-radius: 50%;
      animation: spin-icon 0.8s linear infinite;
    }
    .watch-link {
      color: #5DCAA5; font-size: 12px; text-decoration: none;
      padding: 6px 14px; border: 0.5px solid #5DCAA5;
      border-radius: 999px; margin-top: 6px;
    }

    /* ── Meta ── */
    .meta {
      padding: 12px 14px 16px;
      flex-shrink: 0;
      border-top: 0.5px solid var(--border);
      background: var(--surface);
    }
    .meta-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 8px;
      gap: 8px;
    }
    .meta-top-left {
      display: flex;
      align-items: center;
      gap: 8px;
      min-width: 0;
    }
    .badge {
      font-size: 10px; font-weight: 600;
      letter-spacing: 0.3px; text-transform: uppercase;
      padding: 3px 9px; border-radius: 999px;
      background: rgba(29,158,117,0.12); color: #1D9E75;
      white-space: nowrap; flex-shrink: 0;
    }
    .posted-date {
      font-size: 11px;
      color: var(--muted);
      white-space: nowrap;
    }
    .comments-link {
      font-size: 12px; color: #5DCAA5;
      text-decoration: none; font-weight: 500;
      white-space: nowrap; flex-shrink: 0;
    }
    .card-title {
      font-size: 13px;
      font-weight: 500;
      line-height: 1.5;
      color: var(--text);
      word-break: break-word;
      /* No truncation — show full caption */
    }
    .views {
      font-size: 11px;
      color: var(--muted);
      margin-top: 6px;
    }

    /* ── Stamps ── */
    .stamp {
      position: absolute; top: 28px;
      font-size: 28px; font-weight: 900;
      padding: 8px 16px; border-radius: 8px;
      opacity: 0; pointer-events: none;
      z-index: 10; letter-spacing: 3px; text-transform: uppercase;
    }
    .stamp.approve { left: 18px; color: #1D9E75; border: 4px solid #1D9E75; transform: rotate(-15deg); background: rgba(255,255,255,0.9); }
    .stamp.reject  { right: 18px; color: #E24B4A; border: 4px solid #E24B4A; transform: rotate(15deg);  background: rgba(255,255,255,0.9); }
    .card-bg-overlay { position: absolute; inset: 0; border-radius: 20px; pointer-events: none; z-index: 1; opacity: 0; }

    /* ── Done ── */
    .done { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 2rem 1rem; overflow-y: auto; gap: 0; }
    .done .check { font-size: 48px; margin-bottom: 12px; }
    .done h2 { font-size: 22px; font-weight: 700; margin-bottom: 6px; letter-spacing: -0.4px; }
    .done > p { font-size: 14px; color: var(--muted); margin-bottom: 20px; }
    .pills { display: flex; gap: 10px; margin-bottom: 20px; }
    .pill { padding: 6px 18px; border-radius: 999px; font-size: 13px; font-weight: 600; }
    .pill.a { background: var(--approve-bg); color: var(--approve); border: 0.5px solid var(--approve); }
    .pill.r { background: var(--reject-bg);  color: var(--reject);  border: 0.5px solid var(--reject); }
    .approved-list { width: 100%; border: 0.5px solid var(--border); border-radius: 14px; overflow: hidden; margin-bottom: 16px; text-align: left; }
    .approved-item { padding: 11px 14px; border-bottom: 0.5px solid var(--border); display: flex; justify-content: space-between; align-items: center; gap: 8px; }
    .approved-item:last-child { border-bottom: none; }
    .approved-item .t { font-size: 13px; font-weight: 500; flex: 1; line-height: 1.3; }
    .approved-item .v { font-size: 11px; color: var(--muted); white-space: nowrap; }
    .btn-generate { width: 100%; padding: 15px; border-radius: 14px; font-size: 15px; font-weight: 700; cursor: pointer; border: none; background: var(--approve); color: #fff; font-family: inherit; }
    .btn-again { width: 100%; padding: 13px; border-radius: 14px; font-size: 14px; font-weight: 600; cursor: pointer; border: 0.5px solid var(--border); background: var(--surface); color: var(--text); margin-top: 10px; font-family: inherit; }
  </style>
</head>
<body>
<div class="app" id="app"></div>

<script>
let formats = [];
let current = 0;
const approved = [], rejected = [];
let startX = 0, startY = 0, isDragging = false, dragX = 0;

// ── Cache ──────────────────────────────────────────────────────
function saveCache(videos) {
  localStorage.setItem('kf_videos', JSON.stringify(videos));
  localStorage.setItem('kf_pulled', new Date().toISOString());
}
function loadCache() {
  try {
    const v = localStorage.getItem('kf_videos');
    const t = localStorage.getItem('kf_pulled');
    if (v && t) return { videos: JSON.parse(v), pulled: t };
  } catch(e) {}
  return null;
}
function formatPulledDate(iso) {
  const d = new Date(iso);
  return d.toLocaleDateString('en-GB', { day: 'numeric', month: 'short' }) +
    ', ' + d.toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit' });
}
function formatPosted(iso) {
  if (!iso) return null;
  const d = new Date(iso);
  if (isNaN(d)) return null;
  const diffDays = Math.floor((Date.now() - d) / (1000 * 60 * 60 * 24));
  if (diffDays === 0) return 'Today';
  if (diffDays === 1) return 'Yesterday';
  if (diffDays < 7)  return diffDays + 'd ago';
  return d.toLocaleDateString('en-GB', { day: 'numeric', month: 'short' });
}

// ── Header HTML ────────────────────────────────────────────────
function headerHTML(pulledAt) {
  return `
    <div class="header">
      <div class="header-left">
        <h1>Format review</h1>
        <div class="total-count" id="total-count">${formats.length} videos to review</div>
      </div>
      <div class="header-right">
        <button class="refresh-btn" onclick="triggerRefresh()" id="refresh-btn">
          <span class="refresh-icon" id="refresh-icon">↻</span> Refresh
        </button>
        <span class="last-pulled" id="last-pulled">${pulledAt ? 'Last pulled: ' + formatPulledDate(pulledAt) : 'Never pulled'}</span>
      </div>
    </div>
  `;
}

// ── Card UI ────────────────────────────────────────────────────
function showCardUI(pulledAt) {
  current = 0;
  approved.length = 0;
  rejected.length = 0;

  document.getElementById('app').innerHTML = `
    ${headerHTML(pulledAt)}
    <div class="progress-bar"><div class="progress-fill" id="progress" style="width:${100/formats.length}%"></div></div>
    <div class="card-area">
      <div class="card-stack">
        <div class="deck-card deck-card-3"></div>
        <div class="deck-card deck-card-2"></div>
        <div class="card" id="card">
          <div class="stamp approve" id="stamp-a">APPROVE</div>
          <div class="stamp reject"  id="stamp-r">SKIP</div>
          <div class="card-bg-overlay" id="bg-overlay"></div>
          <div class="video-frame" id="video-frame">
            <div class="video-loading"><div class="spinner"></div><span>Loading...</span></div>
          </div>
          <div class="meta" id="meta"></div>
        </div>
      </div>
    </div>
  `;
  attachTouchEvents();
  loadCard(0);
}

async function loadCard(idx) {
  const vf   = document.getElementById('video-frame');
  const meta = document.getElementById('meta');
  const prog = document.getElementById('progress');
  const tc   = document.getElementById('total-count');
  const f    = formats[idx];

  if (prog) prog.style.width = `${((idx+1)/formats.length)*100}%`;
  if (tc)   tc.textContent   = `${idx+1} / ${formats.length} videos`;

  vf.innerHTML = '<div class="video-loading"><div class="spinner"></div><span>Loading...</span></div>';

  const postedStr  = formatPosted(f.created);
  const postedHTML = postedStr ? `<span class="posted-date">${postedStr}</span>` : '';

  meta.innerHTML = `
    <div class="meta-top">
      <div class="meta-top-left">
        <span class="badge">@${f.author || 'tiktok'}</span>
        ${postedHTML}
      </div>
      <a class="comments-link" href="${f.url}" target="_blank">💬 Comments</a>
    </div>
    <div class="card-title">${f.title}</div>
    <div class="views">♥ ${f.views} likes &nbsp;·&nbsp; 💬 ${f.comments || '–'} comments</div>
  `;

  if (f.thumbnail) {
    showThumb(vf, f.thumbnail, f.url);
  } else {
    try {
      const res  = await fetch(`/api/oembed?url=${encodeURIComponent(f.url)}`);
      const data = await res.json();
      if (data.thumbnail_url) showThumb(vf, data.thumbnail_url, f.url);
      else showFallback(vf, f.url);
    } catch { showFallback(vf, f.url); }
  }
}

function showThumb(vf, thumb, url) {
  vf.innerHTML = `
    <a href="${url}" target="_blank" style="display:block;width:100%;height:100%;position:relative;text-decoration:none;">
      <img src="${thumb}" style="width:100%;height:100%;object-fit:cover;display:block;" />
      <div style="position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;background:rgba(0,0,0,0.35);">
        <div style="width:56px;height:56px;background:rgba(255,255,255,0.95);border-radius:50%;display:flex;align-items:center;justify-content:center;">
          <div style="width:0;height:0;border-style:solid;border-width:10px 0 10px 20px;border-color:transparent transparent transparent #000;margin-left:4px;"></div>
        </div>
        <span style="color:#fff;font-size:13px;font-weight:600;background:rgba(0,0,0,0.5);padding:5px 14px;border-radius:999px;">Watch on TikTok</span>
      </div>
    </a>`;
}

function showFallback(vf, url) {
  vf.innerHTML = `<div class="video-loading"><span>Preview unavailable</span><a class="watch-link" href="${url}" target="_blank">Watch on TikTok →</a></div>`;
}

// ── Swipe ──────────────────────────────────────────────────────
function swipe(dir) {
  if (current >= formats.length) return;
  const card = document.getElementById('card');
  card.classList.add('animating', dir === 'right' ? 'fly-right' : 'fly-left');
  if (dir === 'right') approved.push(formats[current]);
  else rejected.push(formats[current]);
  current++;
  setTimeout(() => {
    card.classList.remove('animating','fly-right','fly-left');
    card.style.transform = '';
    ['stamp-a','stamp-r','bg-overlay'].forEach(id => {
      const el = document.getElementById(id); if (el) el.style.opacity = 0;
    });
    if (current >= formats.length) showDone();
    else loadCard(current);
  }, 400);
}

function showDone() {
  const pulled = localStorage.getItem('kf_pulled');
  document.getElementById('app').innerHTML = `
    ${headerHTML(pulled)}
    <div class="done">
      <div class="check">✓</div>
      <h2>Review complete</h2>
      <p>${approved.length} format${approved.length !== 1 ? 's' : ''} approved</p>
      <div class="pills">
        <span class="pill a">${approved.length} approved</span>
        <span class="pill r">${rejected.length} skipped</span>
      </div>
      ${approved.length > 0 ? `
        <div class="approved-list">
          ${approved.map(f => `<div class="approved-item"><span class="t">${f.title}</span><span class="v">${f.views}</span></div>`).join('')}
        </div>
        <button class="btn-generate" onclick="alert('Script generation coming soon.')">Generate scripts →</button>
      ` : '<p style="color:var(--muted);font-size:14px">No formats approved this round.</p>'}
      <button class="btn-again" onclick="startReview()">Review again</button>
    </div>
  `;
}

function startReview() {
  const cache = loadCache();
  if (cache && cache.videos.length > 0) {
    formats = cache.videos;
    showCardUI(cache.pulled);
  } else {
    showEmptyState();
  }
}

// ── Empty state ────────────────────────────────────────────────
function showEmptyState() {
  document.getElementById('app').innerHTML = `
    <div style="display:flex;flex-direction:column;height:100dvh;padding:env(safe-area-inset-top,16px) 16px env(safe-area-inset-bottom,20px);max-width:480px;margin:0 auto;align-items:center;justify-content:center;gap:1.5rem;text-align:center;">
      <div style="font-size:48px;">🎬</div>
      <div>
        <h1 style="font-size:22px;font-weight:700;margin:0 0 8px;letter-spacing:-0.4px;">Format Review</h1>
        <p style="font-size:14px;color:#888;margin:0;">No videos yet. Pull the latest from your tracked accounts.</p>
      </div>
      <button onclick="triggerRefresh()" id="refresh-btn" style="width:100%;max-width:320px;padding:16px;border-radius:14px;font-size:15px;font-weight:700;cursor:pointer;border:none;background:#1D9E75;color:#fff;font-family:inherit;">
        Get fresh videos
      </button>
      <p style="font-size:12px;color:#aaa;margin:0;">@starvicks51 · @fluently.kate · @lola_englishspeak · @keisha.learns</p>
    </div>
  `;
}

// ── Refresh ────────────────────────────────────────────────────
async function triggerRefresh() {
  const icon      = document.getElementById('refresh-icon');
  const btn       = document.getElementById('refresh-btn');
  const lastLabel = document.getElementById('last-pulled');

  if (icon) icon.classList.add('spinning');
  if (btn)  btn.disabled = true;
  if (lastLabel) lastLabel.textContent = 'Starting scrape...';

  try {
    const startRes  = await fetch('/api/apify?action=start');
    const startData = await startRes.json();
    const runId     = startData.runId;
    if (!runId) throw new Error('Failed to start Apify run');

    let datasetId = null, attempts = 0;
    while (attempts < 60) {
      await new Promise(r => setTimeout(r, 5000));
      attempts++;
      if (lastLabel) lastLabel.textContent = `Scraping... (${attempts * 5}s)`;
      const statusRes  = await fetch(`/api/apify?action=status&runId=${runId}`);
      const statusData = await statusRes.json();
      if (statusData.status === 'SUCCEEDED') { datasetId = statusData.datasetId; break; }
      if (statusData.status === 'FAILED' || statusData.status === 'ABORTED') throw new Error('Apify run failed');
    }
    if (!datasetId) throw new Error('Timed out');

    if (lastLabel) lastLabel.textContent = 'Loading videos...';
    const resultsRes  = await fetch(`/api/apify?action=results&datasetId=${datasetId}`);
    const resultsData = await resultsRes.json();
    if (!resultsData.videos || resultsData.videos.length === 0) throw new Error('No videos found');

    formats = resultsData.videos.map(v => ({
      title:     v.title || 'No caption',
      views:     v.views > 1000000 ? (v.views/1000000).toFixed(1)+'M' : v.views > 1000 ? Math.round(v.views/1000)+'K' : String(v.views || 0),
      comments:  v.comments > 1000 ? Math.round(v.comments/1000)+'K' : String(v.comments || 0),
      url:       v.url,
      thumbnail: v.thumbnail,
      author:    v.author,
      created:   v.created
    }));

    saveCache(formats);
    showCardUI(localStorage.getItem('kf_pulled'));

  } catch (err) {
    if (icon)      icon.classList.remove('spinning');
    if (btn)       btn.disabled = false;
    if (lastLabel) lastLabel.textContent = 'Refresh failed — try again';
    console.error(err);
  }
}

// ── Touch events ───────────────────────────────────────────────
function attachTouchEvents() {
  const card = document.getElementById('card');
  if (!card) return;
  card.addEventListener('touchstart', e => {
    startX = e.touches[0].clientX; startY = e.touches[0].clientY;
    isDragging = true; dragX = 0;
  }, { passive: true });
  card.addEventListener('touchmove', e => {
    if (!isDragging) return;
    dragX = e.touches[0].clientX - startX;
    const dragY = e.touches[0].clientY - startY;
    if (Math.abs(dragX) < Math.abs(dragY) && Math.abs(dragX) < 10) return;
    card.style.transform = `translateX(${dragX}px) rotate(${dragX * 0.06}deg)`;
    const progress = Math.abs(dragX) > 30 ? Math.min((Math.abs(dragX) - 30) / 70, 1) : 0;
    const sa = document.getElementById('stamp-a');
    const sr = document.getElementById('stamp-r');
    const ov = document.getElementById('bg-overlay');
    if (sa) sa.style.opacity = dragX > 30 ? progress : 0;
    if (sr) sr.style.opacity = dragX < -30 ? progress : 0;
    if (ov) {
      ov.style.background = dragX > 30 ? 'rgba(29,158,117,0.15)' : dragX < -30 ? 'rgba(226,75,74,0.15)' : 'transparent';
      ov.style.opacity = progress;
    }
  }, { passive: true });
  card.addEventListener('touchend', () => {
    if (!isDragging) return;
    isDragging = false;
    if (dragX > 80) swipe('right');
    else if (dragX < -80) swipe('left');
    else {
      card.style.transform = '';
      ['stamp-a','stamp-r','bg-overlay'].forEach(id => {
        const el = document.getElementById(id); if (el) el.style.opacity = 0;
      });
    }
  });
}

if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js');

// ── Boot ───────────────────────────────────────────────────────
const cache = loadCache();
if (cache && cache.videos.length > 0) {
  formats = cache.videos;
  showCardUI(cache.pulled);
} else {
  showEmptyState();
}
</script>
</body>
</html>
